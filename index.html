<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅拍档期派·商家控制台</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root {
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --border: #E2E8F0;
            --green: #00C853;
            --yellow: #FFE100;
            --copper: #D84315;
            --text: #1a1a2e;
            --text-secondary: #5a6a7e;
            --glass: rgba(255, 255, 255, 0.75);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.05);
            --shadow-glow-green: 0 0 20px rgba(0, 200, 83, 0.35), 0 0 6px rgba(0, 200, 83, 0.2);
            --shadow-glow-yellow: 0 0 22px rgba(255, 225, 0, 0.5), 0 0 8px rgba(255, 225, 0, 0.3);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition-jelly: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 顶部导航玻璃条 */
        .topnav-glass {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            z-index: 100;
            position: relative;
        }

        /* 运力墙 */
        .staff-wall {
            background: var(--card);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            z-index: 50;
        }
        .staff-card {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all var(--transition-smooth);
            cursor: default;
            position: relative;
        }
        .staff-card.idle-highlight {
            border-color: var(--green) !important;
            box-shadow: var(--shadow-glow-green) !important;
            background: #f0fdf6 !important;
            animation: pulseGreen 1.2s ease-in-out infinite;
        }
        .staff-card.overload-warn {
            border-color: var(--yellow) !important;
            box-shadow: var(--shadow-glow-yellow) !important;
            animation: breatheYellow 0.7s ease-in-out infinite;
        }
        @keyframes pulseGreen {
            0%,
            100% {
                box-shadow: 0 0 12px rgba(0, 200, 83, 0.25), 0 0 3px rgba(0, 200, 83, 0.15);
            }
            50% {
                box-shadow: 0 0 28px rgba(0, 200, 83, 0.5), 0 0 10px rgba(0, 200, 83, 0.3);
            }
        }
        @keyframes breatheYellow {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 225, 0, 0.3), 0 0 4px rgba(255, 225, 0, 0.2);
                border-color: #ffe100;
            }
            50% {
                box-shadow: 0 0 28px rgba(255, 225, 0, 0.7), 0 0 14px rgba(255, 200, 0, 0.5);
                border-color: #ffc107;
            }
        }

        /* 轨道列 */
        .track-column {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            min-height: 0;
            transition: all var(--transition-smooth);
            position: relative;
        }
        .track-column.drag-over {
            border-color: var(--green) !important;
            box-shadow: var(--shadow-glow-green) !important;
            background: #fafffb !important;
        }
        .track-column.track-disabled {
            opacity: 0.45;
            pointer-events: none;
            background: #f0f0f0 !important;
            border-style: dashed !important;
        }
        .track-header {
            flex-shrink: 0;
            padding: 12px 10px 8px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--card);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            z-index: 2;
        }
        .track-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
            border-radius: 999px;
            background: #1a1a2e;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
            padding: 0 8px;
            margin-left: 4px;
        }
        .track-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 6px;
            box-shadow: 0 0 8px rgba(0, 200, 83, 0.5);
        }
        .track-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            min-height: 0;
            scroll-behavior: smooth;
        }
        .track-body::-webkit-scrollbar {
            width: 3px;
        }
        .track-body::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        .track-body::-webkit-scrollbar-track {
            background: transparent;
        }

        /* 订单卡片 */
        .order-card {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            cursor: grab;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-jelly);
            position: relative;
            flex-shrink: 0;
            font-size: 13px;
            line-height: 1.5;
        }
        .order-card:active {
            cursor: grabbing;
        }
        .order-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .order-card.dragging {
            opacity: 0.55;
            transform: scale(0.94);
            box-shadow: var(--shadow-lg);
            border-style: dashed;
            cursor: grabbing;
        }
        .order-card.drop-bounce {
            animation: jellyPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .order-card.overload-card {
            border-color: var(--yellow) !important;
            animation: breatheYellowCard 0.7s ease-in-out infinite;
        }
        @keyframes jellyPop {
            0% {
                transform: scale(0.88);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.05);
                opacity: 1;
            }
            70% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes breatheYellowCard {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(255, 225, 0, 0.25);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 225, 0, 0.6), 0 0 8px rgba(255, 180, 0, 0.4);
            }
        }
        .channel-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ede9fe, #f3e8ff);
            color: #7c3aed;
            margin-bottom: 4px;
        }
        .type-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            letter-spacing: 0.4px;
        }
        .type-tag.makeup {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
        }
        .type-tag.rental {
            background: #e3f2fd;
            color: #0d47a1;
            border: 1px solid #90caf9;
        }
        .type-tag.photo {
            background: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #a5d6a7;
        }

        /* 按钮与交互 */
        .btn-action {
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            transition: all var(--transition-smooth);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .btn-action:hover {
            background: #f9fafb;
            border-color: #cbd5e1;
        }
        .btn-action.btn-green {
            background: #e8f5e9;
            border-color: #a5d6a7;
            color: #1b5e20;
        }
        .btn-action.btn-green:hover {
            background: #c8e6c9;
            border-color: #66bb6a;
        }
        .btn-action.btn-copper {
            background: #fbe9e7;
            border-color: #ffab91;
            color: #bf360c;
        }
        .btn-action.btn-copper:hover {
            background: #ffccbc;
            border-color: #ff8a65;
        }
        .btn-action.btn-print {
            background: #f5f5f5;
            border-color: #bdbdbd;
            color: #424242;
        }
        .btn-action.btn-print:hover {
            background: #eeeeee;
            border-color: #9e9e9e;
        }

        /* 计价器 */
        .price-calc {
            background: #fafafa;
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
            border: 1px dashed #e0e0e0;
            font-size: 11px;
        }
        .price-calc select {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
        }
        .price-calc .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1.5px solid #ccc;
            background: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-smooth);
        }
        .price-calc .qty-btn:hover {
            background: #f0f0f0;
            border-color: #999;
        }
        .price-calc .qty-num {
            font-weight: 700;
            font-size: 15px;
            min-width: 28px;
            text-align: center;
            display: inline-block;
        }

        /* 模态弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-box {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            max-width: 520px;
            width: 90%;
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 打印样式 */
        @media print {
            body * {
                visibility: hidden !important;
            }
            #printArea,
            #printArea * {
                visibility: visible !important;
            }
            #printArea {
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                max-width: 297mm !important;
                min-height: 190mm !important;
                max-height: 210mm !important;
                padding: 8mm 10mm !important;
                background: #fff !important;
                z-index: 99999 !important;
                font-size: 10px !important;
                color: #000 !important;
                overflow: hidden !important;
                page-break-after: avoid !important;
            }
            #printArea .print-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 10px;
            }
            #printArea .print-table td,
            #printArea .print-table th {
                border: 0.5px solid #999;
                padding: 4px 6px;
                text-align: left;
            }
            #printArea .print-signature {
                display: inline-block;
                width: 100px;
                border-bottom: 1px solid #000;
                margin: 0 12px;
            }
            @page {
                size: A4 landscape;
                margin: 2mm;
            }
        }
    </style>
</head>

<script>
    (function() {
        // ==================== IndexedDB 封装 ====================
        const DB_NAME = 'TravelPhotoScheduler';
        const DB_VERSION = 1;
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('orders')) {
                        database.createObjectStore('orders', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('staff')) {
                        database.createObjectStore('staff', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('settings')) {
                        database.createObjectStore('settings', { keyPath: 'key' });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function dbPut(storeName, data) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not ready'); return; }
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.put(data);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        function dbGetAll(storeName) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not ready'); return; }
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function dbDelete(storeName, id) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not ready'); return; }
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        function dbClear(storeName) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not ready'); return; }
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.clear();
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        // ==================== 数据加载与同步 ====================
        async function loadAllData() {
            try {
                const orders = await dbGetAll('orders');
                const staff = await dbGetAll('staff');
                const settingsArr = await dbGetAll('settings');
                if (orders.length === 0 && staff.length === 0) {
                    // 首次使用，写入默认数据
                    const defStaff = getDefaultStaff();
                    const defOrders = getDefaultOrders();
                    for (const s of defStaff) await dbPut('staff', s);
                    for (const o of defOrders) await dbPut('orders', o);
                    allStaff = defStaff;
                    allOrders = defOrders;
                    todayFlowCounter = defOrders.length;
                } else {
                    allStaff = staff.length > 0 ? staff : getDefaultStaff();
                    allOrders = orders;
                    todayFlowCounter = orders.length;
                }
                if (settingsArr.length > 0) {
                    const settingsMap = {};
                    settingsArr.forEach(s => settingsMap[s.key] = s.value);
                    appSettings.selectionMode = settingsMap['selectionMode'] || 'inStore';
                    appSettings.priceStandard = parseFloat(settingsMap['priceStandard']) || 30;
                    appSettings.pricePremium = parseFloat(settingsMap['pricePremium']) || 60;
                    appSettings.priceCommercial = parseFloat(settingsMap['priceCommercial']) || 120;

                // 确保staff数据完整
                if (allStaff.length === 0) allStaff = getDefaultStaff();
                recalcStaffLoads();

                console.error('数据加载失败，使用内存默认数据:', err);

        // ==================== 运力计算 ====================
        function recalcStaffLoads() {
            // 重置负载
            allStaff.forEach(s => { s.currentLoad = 0;
                s.status = 'idle'; });
            allOrders.forEach(order => {
                if (order.currentTrack === 'track3' && order.makeupArtistId) {
                    const staff = allStaff.find(s => s.id === order.makeupArtistId);
                    if (staff) staff.currentLoad++;
                }
                if (order.currentTrack === 'track4' && order.photographerId) {
                    const staff = allStaff.find(s => s.id === order.photographerId);
                    if (staff) staff.currentLoad++;
                }
            });
            allStaff.forEach(s => {
                if (s.currentLoad === 0) s.status = 'idle';
                else if (s.currentLoad === 1) s.status = 'busy';
                else s.status = 'overload';
            });
        }

            if (s.status === 'idle') return '🟢 空闲';
            if (s.status === 'busy') return '🟡 忙碌';
            return '🔴 超载';
        }

                if (track.key === 'selection' && appSettings.selectionMode === 'inStore') {
                    sortedOrders.sort((a, b) => a.timestamp - b.timestamp);

function updateTrackDisabledStates() {
    // 对于每张卡片，判断其在当前轨道下的禁用逻辑
    // 轨道3(妆造中)对photo_only卡片禁用
    // 轨道4(指派摄影)对makeup_only卡片禁用
    // 这些在dragOver/drop时处理，这里做视觉标记
    TRACKS.forEach(track => {
        const col = document.getElementById('track-col-' + track.id);
        if (!col) return;
        // 移除旧的禁用标记类
        col.classList.remove('track-disabled');
    });
}

function updateTrackBadges() {
    TRACKS.forEach(track => {
        const badge = document.getElementById('badge-' + track.id);
        if (badge) {
            const count = allOrders.filter(o => o.currentTrack === track.id).length;
            badge.textContent = count;
        }
    });
}

function updateRevenue() {
    const today = new Date().toISOString().split('T')[0];
    const todayOrders = allOrders.filter(o => o.date === today);
    let total = 0;
    todayOrders.forEach(o => {
        total += (o.deposit || 0) + (o.extraCost || 0);
    });
    document.getElementById('todayRevenue').textContent = '¥' + total.toLocaleString();
}

// ==================== 拖拽处理 ====================
function handleDragStart(e) {
    const card = e.target.closest('.order-card');
    if (!card) return;
    draggingOrderId = card.dataset.orderId;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggingOrderId);
    // 设置拖拽图像
    const ghost = card.cloneNode(true);
    ghost.style.position = 'absolute';
    ghost.style.top = '-9999px';
    ghost.style.opacity = '0.7';
    ghost.style.width = card.offsetWidth + 'px';
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost, ghost.offsetWidth / 2, 30);
    setTimeout(() => document.body.removeChild(ghost), 0);
}

function handleDragEnd(e) {
    const card = e.target.closest('.order-card');
    if (card) card.classList.remove('dragging');
    draggingOrderId = null;
    globalHighlightRole = null;
    hoveredTrackKey = null;
    // 清除所有轨道高亮
    document.querySelectorAll('.track-column').forEach(col => col.classList.remove('drag-over'));
    renderStaffWall();
}

function handleDragOver(e, trackId, trackKey) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    hoveredTrackKey = trackKey;
    const col = document.getElementById('track-col-' + trackId);
    if (col) col.classList.add('drag-over');

    // 判断运力墙高亮角色
    if (trackKey === 'styling') {
        globalHighlightRole = 'makeup';
    } else if (trackKey === 'shooting') {
        globalHighlightRole = 'photo';
    } else {
        globalHighlightRole = null;
    }
    renderStaffWall();

    // 检查禁用逻辑
    if (draggingOrderId) {
        const order = allOrders.find(o => o.id === draggingOrderId);
        if (order) {
            if (trackKey === 'styling' && order.type === 'photo_only') {
                e.dataTransfer.dropEffect = 'none';
                if (col) col.classList.add('track-disabled');
            }
            if (trackKey === 'shooting' && order.type === 'makeup_only') {
                e.dataTransfer.dropEffect = 'none';
                if (col) col.classList.add('track-disabled');
            }
        }
    }
}

function handleDragLeave(e, trackId) {
    const col = document.getElementById('track-col-' + trackId);
    if (col) col.classList.remove('drag-over');
    if (hoveredTrackKey === col?.dataset?.trackKey) {
        hoveredTrackKey = null;
        globalHighlightRole = null;
        renderStaffWall();
    }
}

async function handleDrop(e, trackId, trackKey) {
    e.preventDefault();
    const col = document.getElementById('track-col-' + trackId);
    if (col) col.classList.remove('drag-over');
    globalHighlightRole = null;
    hoveredTrackKey = null;

    const orderId = e.dataTransfer.getData('text/plain') || draggingOrderId;
    if (!orderId) { renderStaffWall(); return; }

    const order = allOrders.find(o => o.id === orderId);
    if (!order) { renderStaffWall(); return; }

    // 禁用检查
    if (trackKey === 'styling' && order.type === 'photo_only') {
        alert('⚠️ 纯摄影模式订单无需妆造，请直接拖入「指派摄影」轨道');
        renderStaffWall();
        return;
    }
    if (trackKey === 'shooting' && order.type === 'makeup_only') {
        alert('⚠️ 纯妆造模式订单无需拍摄，请使用「跳过拍摄」按钮直飞结算');
        renderStaffWall();
        return;
    }
    // 服装外借在选片轨道的拦截
    if (trackKey === 'selection' && order.type === 'rental' && !order.rentalDepositPaid) {
        alert('⚠️ 服装外借订单在进入选片轨道前，必须登记押金！');
        openDepositModal(order.id);
        // 仍然允许移动但标记
    }

    const oldTrack = order.currentTrack;
    order.currentTrack = trackId;
    order.timestamp = Date.now();

    // 自动分配技师
    if (trackKey === 'styling' && !order.makeupArtistId && order.type !== 'photo_only') {
        const idleStaff = allStaff.find(s => s.role === 'makeup' && s.status === 'idle');
        if (idleStaff) {
            order.makeupArtistId = idleStaff.id;
        } else {
            // 分配负载最低的
            const makeupStaff = allStaff.filter(s => s.role === 'makeup');
            if (makeupStaff.length > 0) {
                const leastLoaded = makeupStaff.reduce((a, b) => a.currentLoad <= b.currentLoad ? a : b);
                order.makeupArtistId = leastLoaded.id;
            }
        }
    }
    if (trackKey === 'shooting' && !order.photographerId && order.type !== 'makeup_only') {
        const idleStaff = allStaff.find(s => s.role === 'photo' && s.status === 'idle');
        if (idleStaff) {
            order.photographerId = idleStaff.id;
        } else {
            const photoStaff = allStaff.filter(s => s.role === 'photo');
            if (photoStaff.length > 0) {
                const leastLoaded = photoStaff.reduce((a, b) => a.currentLoad <= b.currentLoad ? a : b);
                order.photographerId = leastLoaded.id;
            }
        }
    }
    // 离开妆造轨道时清除化妆师分配（释放运力）
    if (oldTrack === 'track3' && trackId !== 'track3') {
        order.makeupArtistId = null;
    }
    // 离开摄影轨道时清除摄影师分配
    if (oldTrack === 'track4' && trackId !== 'track4') {
        order.photographerId = null;
    }

    await saveOrder(order);
    recalcStaffLoads();
    renderAll();

    // 果冻弹跳动画
    setTimeout(() => {
        const cardEl = document.getElementById('card-' + order.id);
        if (cardEl) {
            cardEl.classList.add('drop-bounce');
            setTimeout(() => cardEl.classList.remove('drop-bounce'), 500);
        }
        // 滚动到卡片位置
        const trackBody = document.getElementById('track-body-' + trackId);
        if (trackBody && cardEl) {
            cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 80);

    // 超载检查与提示
    if (trackKey === 'styling' && order.makeupArtistId) {
        const s = allStaff.find(st => st.id === order.makeupArtistId);
        if (s && s.currentLoad >= 2) {
            setTimeout(() => alert(`⚠️ 运力超载预警！\n${s.name} 当前背负 ${s.currentLoad} 单，请关注！`), 300);
        }
    }
    if (trackKey === 'shooting' && order.photographerId) {
        const s = allStaff.find(st => st.id === order.photographerId);
        if (s && s.currentLoad >= 2) {
            setTimeout(() => alert(`⚠️ 运力超载预警！\n${s.name} 当前背负 ${s.currentLoad} 单，请关注！`), 300);
        }
    }
}

// ==================== 智能输入解析 ====================
function handleQuickInput() {
    const input = document.getElementById('quickInput');
    const raw = input.value.trim();
    if (!raw) return;
    const result = parseInput(raw);
    createNewOrder(result);
    input.value = '';
    input.focus();
}

function parseInput(raw) {
    // 尝试匹配电话（11位数字）
    const phoneMatch = raw.match(/1[3-9]\d{9}/);
    let phone = phoneMatch ? phoneMatch[0] : '';
    let remaining = raw.replace(phone, '').trim();

    // 尝试匹配金额（纯数字，可能是定金）
    const amounts = remaining.match(/\d+/g);
    let deposit = 0;
    if (amounts && amounts.length > 0) {
        // 取第一个看起来像金额的数字（不是电话的一部分）
        for (const am of amounts) {
            const val = parseInt(am);
            if (val > 0 && val < 100000 && am.length <= 6) {
                deposit = val;
                remaining = remaining.replace(am, '').trim();
                break;
            }
        }
    }

    // 剩余部分解析姓名和渠道
    const parts = remaining.split(/\s+/).filter(Boolean);
    let name = '匿名散客';
    let channel = '散客';

    if (parts.length === 0) {
        name = '匿名散客';
        channel = '散客';
    } else if (parts.length === 1) {
        const first = parts[0];
        if (/^[\u4e00-\u9fa5]{2,4}$/.test(first) && !/美团|点评|小红书|抖音|导游|携程|飞猪|马蜂窝/i.test(first)) {
            name = first;
            channel = '散客';
        } else {
            name = '匿名散客';
            channel = first;
        }
    } else {
        // 第一个中文词组作为姓名
        const firstIsName = /^[\u4e00-\u9fa5]{2,4}$/.test(parts[0]) && !/美团|点评|小红书|抖音|导游|携程|飞猪|马蜂窝|淘宝|微信|支付宝/i
            .test(parts[0]);
        if (firstIsName) {
            name = parts[0];
            channel = parts.slice(1).join(' ') || '散客';
        } else {
            name = '匿名散客';
            channel = parts.join(' ');
        }
    }

    // 清理渠道名称
    if (channel.length > 20) channel = channel.substring(0, 20);

    return { name, phone, deposit, channel };
}

async function createNewOrder(parsed) {
    todayFlowCounter++;
    const today = new Date().toISOString().split('T')[0];
    const flowNum = '#' + String(todayFlowCounter).padStart(3, '0');
    const newOrder = {
        id: 'order_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
        flowNumber: flowNum,
        name: parsed.name,
        phone: parsed.phone,
        deposit: parsed.deposit,
        channel: parsed.channel,
        type: 'comprehensive',
        currentTrack: 'track1',
        timestamp: Date.now(),
        wechatAdded: false,
        makeupArtistId: null,
        photographerId: null,
        depositAmount: 0,
        rentalReturned: false,
        extraPhotos: 0,
        retouchLevel: 'standard',
        extraCost: 0,
        totalAmount: parsed.deposit,
        date: today,
        rentalDepositPaid: false,
    };
    allOrders.push(newOrder);
    await saveOrder(newOrder);
    recalcStaffLoads();
    renderAll();
    // 滚动到第一轨
    setTimeout(() => {
        const cardEl = document.getElementById('card-' + newOrder.id);
        if (cardEl) {
            cardEl.classList.add('drop-bounce');
            setTimeout(() => cardEl.classList.remove('drop-bounce'), 500);
            const trackBody = document.getElementById('track-body-track1');
            if (trackBody) cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 100);
}

// ==================== 业务操作 ====================
async function skipToDelivery(orderId) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    if (order.type !== 'makeup_only') {
        alert('仅纯妆造模式可跳过拍摄');
        return;
    }
    order.currentTrack = 'track6';
    order.timestamp = Date.now();
    order.makeupArtistId = null;
    await saveOrder(order);
    recalcStaffLoads();
    renderAll();
}

async function markWechatAdded(orderId) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    order.wechatAdded = true;
    await saveOrder(order);
    renderAll();
}

function openDepositModal(orderId) {
    pendingDepositOrderId = orderId;
    document.getElementById('depositAmountInput').value = '';
    document.getElementById('depositModal').classList.remove('hidden');
}

function closeDepositModal() {
    pendingDepositOrderId = null;
    document.getElementById('depositModal').classList.add('hidden');
}

async function confirmDeposit() {
    if (!pendingDepositOrderId) return;
    const amount = parseInt(document.getElementById('depositAmountInput').value) || 0;
    const order = allOrders.find(o => o.id === pendingDepositOrderId);
    if (order) {
        order.rentalDepositPaid = true;
        order.depositAmount = amount;
        order.totalAmount += amount;
        await saveOrder(order);
    }
    closeDepositModal();
    recalcStaffLoads();
    renderAll();
}

async function markRentalReturned(orderId) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    order.rentalReturned = true;
    await saveOrder(order);
    renderAll();
}

async function updateRetouchLevel(orderId, level) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    order.retouchLevel = level;
    recalcExtraCost(order);
    await saveOrder(order);
    renderAll();
}

async function changeExtraPhotos(orderId, delta) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    order.extraPhotos = Math.max(0, (order.extraPhotos || 0) + delta);
    recalcExtraCost(order);
    await saveOrder(order);
    renderAll();
}

function recalcExtraCost(order) {
    const priceMap = {
        standard: appSettings.priceStandard,
        premium: appSettings.pricePremium,
        commercial: appSettings.priceCommercial,
    };
    const unitPrice = priceMap[order.retouchLevel] || appSettings.priceStandard;
    order.extraCost = order.extraPhotos * unitPrice;
    order.totalAmount = (order.deposit || 0) + order.extraCost + (order.depositAmount || 0);
}

// ==================== 设置弹窗 ====================
function openSettings() {
    document.getElementById('selectionMode').value = appSettings.selectionMode;
    document.getElementById('priceStandard').value = appSettings.priceStandard;
    document.getElementById('pricePremium').value = appSettings.pricePremium;
    document.getElementById('priceCommercial').value = appSettings.priceCommercial;
    document.getElementById('settingsModal').classList.remove('hidden');
}

function closeSettings() {
    appSettings.selectionMode = document.getElementById('selectionMode').value;
    appSettings.priceStandard = parseFloat(document.getElementById('priceStandard').value) || 30;
    appSettings.pricePremium = parseFloat(document.getElementById('pricePremium').value) || 60;
    appSettings.priceCommercial = parseFloat(document.getElementById('priceCommercial').value) || 120;
    document.getElementById('settingsModal').classList.add('hidden');
    saveSettings();
    recalcAllOrderCosts();
    renderAll();
}

function recalcAllOrderCosts() {
    allOrders.forEach(o => recalcExtraCost(o));
}

// ==================== 渠道管理弹窗 ====================
function openChannelManager() {
    const stats = {};
    allOrders.forEach(o => {
        const ch = o.channel || '散客';
        stats[ch] = (stats[ch] || 0) + 1;
    });
    const container = document.getElementById('channelStats');
    container.innerHTML = Object.entries(stats).map(([ch, count]) =>
        `<div class="flex justify-between py-1 border-b border-gray-100"><span class="font-medium">${ch}</span><span class="font-bold">${count} 单</span></div>`
    ).join('') || '<p class="text-gray-400">暂无数据</p>';
    document.getElementById('channelModal').classList.remove('hidden');
}

function closeChannelManager() {
    document.getElementById('channelModal').classList.add('hidden');
}

// ==================== 添加技师 ====================
async function addStaffPrompt(role) {
    const name = prompt(`请输入新${role === 'makeup' ? '化妆师' : '摄影师'}姓名：`);
    if (!name || !name.trim()) return;
    const newStaff = {
        id: 'staff_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        name: name.trim(),
        role: role,
        status: 'idle',
        currentLoad: 0,
    };
    allStaff.push(newStaff);
    await saveStaff(newStaff);
    recalcStaffLoads();
    renderAll();
}

// ==================== 键盘事件 ====================
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('quickInput')) {
        e.preventDefault();
        handleQuickInput();
    }
    // Ctrl+P 触发打印选中卡片（调试用）
    if (e.key === 'p' && e.ctrlKey && draggingOrderId) {
        e.preventDefault();
        printOrder(draggingOrderId);
    }
});

// ==================== 初始化 ====================
async function init() {
    await openDB();
    await loadAllData();
    // 确保所有订单有date字段
    const today = new Date().toISOString().split('T')[0];
    let needsSave = false;
    allOrders.forEach(o => {
        if (!o.date) { o.date = today;
            needsSave = true; }
        if (o.rentalDepositPaid === undefined) { o.rentalDepositPaid = false;
            needsSave = true; }
        if (o.extraPhotos === undefined) { o.extraPhotos = 0;
            needsSave = true; }
        if (o.extraCost === undefined) { o.extraCost = 0;
            needsSave = true; }
        if (o.totalAmount === undefined) { o.totalAmount = (o.deposit || 0);
            needsSave = true; }
    });
    if (needsSave) {
        for (const o of allOrders) await saveOrder(o);
    }
    recalcStaffLoads();
    renderAll();
    document.getElementById('quickInput').focus();
    console.log('✅ 旅拍档期派·商家控制台 初始化完成');
    console.log('   📋 订单数:', allOrders.length);
    console.log('   👥 技师数:', allStaff.length);
    console.log('   💾 IndexedDB 已就绪，支持完全离线运行');
}

init().catch(err => {
    console.error('初始化失败:', err);
    // 降级为纯内存模式
    allStaff = getDefaultStaff();
    allOrders = getDefaultOrders();
    todayFlowCounter = allOrders.length;
    recalcStaffLoads();
    renderAll();
    document.getElementById('quickInput').focus();
    console.warn('⚠️ IndexedDB不可用，运行在内存模式（数据不会持久化）');
});
})();
</script>
