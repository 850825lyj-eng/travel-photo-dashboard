<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅拍档期派 · 商家控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #F8F9FA; --card: #FFFFFF; --border: #E2E8F0; --green: #00C853;
      --yellow: #FFE100; --copper: #D84315; --text: #1a1a2e;
      --glass: rgba(255,255,255,0.78); --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06); --shadow-lg: 0 12px 32px rgba(0,0,0,0.08);
      --purple: #a855f7;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }
    .topnav-glass {
      background: var(--glass); backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm); z-index: 100;
    }
    .staff-wall { background: var(--card); border-right: 1px solid var(--border); }
    .staff-card { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; transition: 0.25s; }
    .staff-card.makeup { border-left: 4px solid var(--purple); }
    .staff-card.photo { border-left: 4px solid var(--green); }
    .staff-card.overload { border-color: var(--yellow) !important; animation: breathe 0.7s infinite; }
    @keyframes breathe { 0%,100%{box-shadow:0 0 10px rgba(255,225,0,0.3)} 50%{box-shadow:0 0 28px rgba(255,225,0,0.7)} }
    .track-column {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      box-shadow: var(--shadow-sm); display: flex; flex-direction: column; transition: 0.2s;
    }
    .track-header {
      flex-shrink:0; padding:12px 8px; text-align:center; border-bottom:1px solid var(--border);
      background: var(--card); border-radius:20px 20px 0 0; z-index:2;
    }
    .track-body { flex:1; overflow-y:auto; padding:8px 6px; display:flex; flex-direction:column; gap:7px; scrollbar-width: thin; }
    .order-card {
      background:#fff; border:1.5px solid var(--border); border-radius:14px; padding:10px;
      box-shadow:var(--shadow-sm); transition:0.3s; font-size:13px; cursor:pointer;
    }
    .btn-action {
      font-size:11px; font-weight:600; padding:8px 12px; border-radius:8px;
      border:1px solid var(--border); background:#fff; cursor:pointer; white-space:nowrap; transition:0.2s;
    }
    .btn-green { background:#e8f5e9; border-color:#a5d6a7; color:#1b5e20; }
    .btn-copper { background:#fbe9e7; border-color:#ffab91; color:#bf360c; }
    .btn-disabled { opacity:0.4; pointer-events:none; }
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter:blur(8px);
      z-index:999; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s;
    }
    .modal-box {
      background:#fff; border-radius:20px; padding:24px; box-shadow:var(--shadow-lg);
      max-width:620px; width:90%; max-height:85vh; overflow-y:auto; animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @media (max-width: 767px) {
      .btn-action { width: 100%; margin-bottom: 4px; }
      .track-body .btn-action { width: auto; }
    }
    @media print {
      body * { visibility:hidden!important; }
      #printArea, #printArea * { visibility:visible!important; }
      #printArea { position:fixed!important; left:0; top:0; width:100%; max-width:297mm; padding:8mm; background:#fff; z-index:99999; font-size:10px; }
      #printArea table { width:100%; border-collapse:collapse; }
      #printArea td { border:0.5px solid #999; padding:4px; }
      @page { size:A4 landscape; margin:2mm; }
    }
  </style>
</head>
<body class="h-screen flex flex-col">

<!-- ==================== 登录遮罩 ==================== -->
<div id="authOverlay" class="fixed inset-0 z-[99999] flex items-center justify-center bg-white/80 backdrop-blur-xl">

    <div class="text-3xl font-bold mb-2" style="color:var(--green);">旅拍档期派</div>
    <div class="text-xs text-gray-400 mb-6">商家控制台</div>

</div>

<!-- ==================== 顶部导航（总控枢纽内聚设计） ==================== -->

      <button onclick="exportBackup()" class="px-3 py-1.5 rounded-full text-xs font-medium text-gray-600 hover:text-[#00C853] hover:bg-white transition">📥 导出</button>

      <button onclick="logout()" class="px-3 py-1.5 rounded-full text-xs font-medium text-gray-600 hover:text-red-500 hover:bg-white transition">退出</button>

      ➕ 新客签到录入

</header>

<!-- ==================== 主体区域 ==================== -->
<div class="flex flex-col lg:flex-row flex-1 overflow-hidden">

  <aside class="staff-wall lg:w-[14%] lg:min-w-[160px] w-full lg:max-w-[190px] flex-shrink-0 overflow-y-auto lg:overflow-y-auto lg:h-full h-auto max-h-[110px] lg:max-h-full overflow-x-auto lg:overflow-x-hidden p-3 gap-2 flex flex-row lg:flex-col" id="staffWall">
    <div class="flex lg:flex-col gap-2 w-full">

<!-- ==================== 自定义模态窗 ==================== -->

      <div><label class="font-semibold block mb-1">支付平台</label>

          <option value="">未选择</option><option value="微信">微信</option><option value="支付宝">支付宝</option><option value="现金">现金</option><option value="刷卡">刷卡</option>

<!-- ==================== 打印区 ==================== -->
<div id="printArea" style="display:none;"></div>

<!-- ==================== 全量 JavaScript 逻辑 ==================== -->
<script>
(() => {
  // ========== IndexedDB 封装 ==========
  const DB_NAME = 'TravelSchedulerV9';
  let db;
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('orders')) d.createObjectStore('orders', { keyPath: 'id' });
        if (!d.objectStoreNames.contains('staff')) d.createObjectStore('staff', { keyPath: 'id' });
        if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'key' });
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = (e) => {
        showModal('⚠️ 隐私模式死锁', '当前处于无痕浏览状态，数据将无法持久化保存，为了您的数据安全，请立即切换为标准模式打开系统！');
        reject(e.target.error);
      };
    });
  }
  function dbPut(store, data) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readwrite');
      tx.objectStore(store).put(data);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }
  function dbGetAll(store) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }
  function dbDelete(store, id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readwrite');
      tx.objectStore(store).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }
  function dbClear(store) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readwrite');
      tx.objectStore(store).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }

  // ========== 权限与登录 ==========
  const PASS = { staff: 'staff888', boss: 'boss999' };
  let role = null;
  function applyRole() {
    const revenueEl = document.getElementById('todayRevenue');
    const channelBtn = document.getElementById('channelBtn');
    if (role === 'staff') {
      if (revenueEl) revenueEl.textContent = '***';
      if (channelBtn) channelBtn.classList.add('btn-disabled');
    } else {
      if (channelBtn) channelBtn.classList.remove('btn-disabled');
    }
  }
  document.getElementById('loginBtn').onclick = () => {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === PASS.boss) { role = 'boss'; sessionStorage.setItem('role','boss'); document.getElementById('authOverlay').classList.add('hidden'); applyRole(); refreshDashboard(); }
    else if (pwd === PASS.staff) { role = 'staff'; sessionStorage.setItem('role','staff'); document.getElementById('authOverlay').classList.add('hidden'); applyRole(); refreshDashboard(); }
    else showModal('密码错误', '请重新输入');
  };
  window.logout = () => { sessionStorage.removeItem('role'); location.reload(); };

  // ========== 自定义模态窗 ==========
  function showModal(title, message, type = 'info', onConfirm = null) {
    const content = document.getElementById('customModalContent');
    let actionsHtml = '';
    if (type === 'confirm') {
      actionsHtml = `<button class="btn-action btn-copper px-4 py-2" onclick="closeModal()">取消</button>
        <button class="btn-action btn-green px-4 py-2" id="modalConfirmBtn">确认</button>`;
    } else {
      actionsHtml = `<button class="btn-action btn-green px-4 py-2" onclick="closeModal()">确定</button>`;
    }
    content.innerHTML = `<h3 class="font-bold text-lg mb-3">${title}</h3><p class="text-sm text-gray-600 mb-4">${message}</p><div class="flex justify-center gap-3">${actionsHtml}</div>`;
    if (type === 'confirm' && onConfirm) {
      document.getElementById('modalConfirmBtn').onclick = () => { closeModal(); onConfirm(); };
    }
    document.getElementById('customModal').classList.remove('hidden');
  }
  window.closeModal = () => document.getElementById('customModal').classList.add('hidden');
  window.showModal = showModal;

  // ========== 添加技师模态 ==========
  window.openAddStaffModal = (roleType) => {
    document.getElementById('addStaffRoleInput').value = roleType;
    document.getElementById('addStaffNameInput').value = '';
    document.getElementById('addStaffModal').classList.remove('hidden');
    setTimeout(() => document.getElementById('addStaffNameInput').focus(), 100);
  };
  window.closeAddStaffModal = () => document.getElementById('addStaffModal').classList.add('hidden');
  window.confirmAddStaff = async () => {
    let name = document.getElementById('addStaffNameInput').value.trim();
    const roleType = document.getElementById('addStaffRoleInput').value;
    if (!name) return;
    if (roleType === 'makeup' && !name.startsWith('化妆师·')) name = '化妆师·' + name;
    if (roleType === 'photo' && !name.startsWith('摄影师·')) name = '摄影师·' + name;
    const s = { id: 'staff_' + Date.now(), name, role: roleType, status: 'idle', currentLoad: 0 };
    await dbPut('staff', s);
    closeAddStaffModal();
    refreshDashboard();
  };

  // ========== 新客录入模态 ==========
  window.openNewOrderModal = () => {
    document.getElementById('newOrderName').value = '';
    document.getElementById('newOrderPhone').value = '';
    document.getElementById('newOrderDeposit').value = '0';
    document.getElementById('newOrderPayment').value = '';
    document.getElementById('newOrderChannelSelect').value = '';
    document.getElementById('newOrderChannelCustom').value = '';
    document.getElementById('newOrderModal').classList.remove('hidden');
    setTimeout(() => document.getElementById('newOrderName').focus(), 100);
  };
  window.closeNewOrderModal = () => document.getElementById('newOrderModal').classList.add('hidden');
  window.confirmNewOrder = async () => {
    const name = document.getElementById('newOrderName').value.trim() || '匿名散客';
    const phone = document.getElementById('newOrderPhone').value.trim() || '';
    const deposit = parseFloat(document.getElementById('newOrderDeposit').value) || 0;
    const payment = document.getElementById('newOrderPayment').value || null;
    let channel = document.getElementById('newOrderChannelCustom').value.trim();
    if (!channel) channel = document.getElementById('newOrderChannelSelect').value;
    if (!channel) channel = '散客';
    flowCounter++;
    const today = new Date().toISOString().split('T')[0];
    const newOrder = {
      id: 'order_' + Date.now(), flowNumber: '#' + String(flowCounter).padStart(3, '0'),
      name, phone, deposit, channel, paymentMethod: payment, type: 'comprehensive',
      currentTrack: 'track1', timestamp: Date.now(), wechatAdded: false,
      makeupArtistId: null, photographerId: null, depositAmount: 0, rentalReturned: false,
      extraPhotos: 0, retouchLevel: 'standard', extraCost: 0, totalAmount: deposit,
      date: today, rentalDepositPaid: false
    };
    await dbPut('orders', newOrder);
    closeNewOrderModal();
    refreshDashboard();
  };

  // ========== 数据模型 ==========
  const TRACKS = [
    { id:'track1', name:'预约到店', icon:'📋', key:'appointment' },
    { id:'track2', name:'选衣确认', icon:'👗', key:'cloth' },
    { id:'track3', name:'妆造中', icon:'💄', key:'styling' },
    { id:'track4', name:'指派摄影', icon:'📷', key:'shooting' },
    { id:'track5', name:'选片', icon:'🖼️', key:'selection' },
    { id:'track6', name:'精修交付', icon:'✅', key:'delivery' }
  ];
  let allOrders = [], allStaff = [], flowCounter = 0;
  let settings = { selectionMode:'inStore', priceStandard:40, pricePremium:60, priceCommercial:100 };
  let currentMobileTab = 'track1';

  function defStaff() {
    return [
      { id:'staff_m1', name:'化妆师·琳达', role:'makeup', status:'idle', currentLoad:0 },
      { id:'staff_m2', name:'化妆师·小雅', role:'makeup', status:'idle', currentLoad:0 },
      { id:'staff_p1', name:'摄影师·阿杰', role:'photo', status:'idle', currentLoad:0 },
      { id:'staff_p2', name:'摄影师·浩然', role:'photo', status:'idle', currentLoad:0 }
    ];
  }
  function defOrders() {
    const t = new Date().toISOString().split('T')[0];
    return [
      { id:'o1', flowNumber:'#001', name:'张美琳', phone:'13800001111', deposit:300, channel:'美团', type:'comprehensive', currentTrack:'track1', timestamp:Date.now()-3600000, wechatAdded:false, makeupArtistId:null, photographerId:null, depositAmount:0, rentalReturned:false, extraPhotos:0, retouchLevel:'standard', extraCost:0, totalAmount:300, date:t, rentalDepositPaid:false, paymentMethod:'微信' },
      { id:'o2', flowNumber:'#002', name:'李思远', phone:'13900002222', deposit:500, channel:'导游小陈', type:'photo_only', currentTrack:'track4', timestamp:Date.now()-1800000, wechatAdded:true, makeupArtistId:null, photographerId:'staff_p1', depositAmount:0, rentalReturned:false, extraPhotos:5, retouchLevel:'premium', extraCost:300, totalAmount:800, date:t, rentalDepositPaid:false, paymentMethod:'支付宝' }
    ];
  }

  async function loadData() {
    const [orders, staff, sets] = await Promise.all([dbGetAll('orders'), dbGetAll('staff'), dbGetAll('settings')]);
    if (!orders.length && !staff.length) {
      allStaff = defStaff(); allOrders = defOrders();
      for (const s of allStaff) await dbPut('staff', s);
      for (const o of allOrders) await dbPut('orders', o);
    } else {
      allStaff = staff.length ? staff : defStaff();
      allOrders = orders;
    }
    if (sets.length) sets.forEach(s => { if (s.key) settings[s.key] = s.value; });
    flowCounter = allOrders.length;
    recalcStaff();
  }

  function recalcStaff() {
    allStaff.forEach(s => { s.currentLoad = 0; s.status = 'idle'; });
    allOrders.forEach(o => {
      if (o.currentTrack==='track3' && o.makeupArtistId) { const s = allStaff.find(x=>x.id===o.makeupArtistId); if(s) s.currentLoad++; }
      if (o.currentTrack==='track4' && o.photographerId) { const s = allStaff.find(x=>x.id===o.photographerId); if(s) s.currentLoad++; }
    });
    allStaff.forEach(s => {
      if (s.currentLoad===0) s.status='idle';
      else if (s.currentLoad===1) s.status='busy';
      else s.status='overload';
    });
  }

  async function refreshDashboard() {
    const [orders, staff] = await Promise.all([dbGetAll('orders'), dbGetAll('staff')]);
    allOrders = orders; allStaff = staff.length ? staff : defStaff();
    recalcStaff();
    renderAll();
  }

  function renderAll() {
    renderStaffWall(); renderTracks();
    if (role==='boss') updateRevenue();
    updateTrackBadges(); updateMobileTabActive();
  }

  function updateRevenue() {
    const today = new Date().toISOString().split('T')[0];
    const total = allOrders.filter(o=>o.date===today).reduce((s,o)=>s+(o.deposit||0)+(o.extraCost||0)+(o.depositAmount||0),0);
    document.getElementById('todayRevenue').textContent = '¥'+total.toLocaleString();
  }

  function updateTrackBadges() {
    TRACKS.forEach(t=>{
      const badge = document.getElementById('badge-'+t.id);
      if(badge) badge.textContent = allOrders.filter(o=>o.currentTrack===t.id).length;
      const tabBtn = document.querySelector(`.tab-btn[data-track="${t.id}"]`);
      if(tabBtn) tabBtn.textContent = `${t.icon}${t.name}(${allOrders.filter(o=>o.currentTrack===t.id).length})`;
    });
  }

  function updateMobileTabActive() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if(btn.dataset.track === currentMobileTab) btn.classList.add('bg-green-100','text-green-700');
      else btn.classList.remove('bg-green-100','text-green-700');
    });
  }

  // ========== 运力墙渲染 ==========
  function renderStaffWall() {
    const mList = document.getElementById('makeupList'), pList = document.getElementById('photoList');
    const build = (s) => {
      const statusText = s.status==='idle'?'🟢空闲':(s.status==='busy'?'🟡忙碌':'🔴超载');
      const overload = s.status==='overload'?'overload':'';
      const roleClass = s.role === 'makeup' ? 'makeup' : 'photo';
      return `<div class="staff-card p-2 text-xs ${roleClass} ${overload} flex-shrink-0 w-[140px] lg:w-auto" id="staff-${s.id}">
        <div class="flex justify-between items-center"><span class="font-semibold truncate">${s.name}</span>
          <span class="text-xs cursor-pointer font-bold px-2 py-0.5 rounded-full border ml-1" style="color:var(--green); border-color:var(--green);" onclick="toggleLeaveConfirm('${s.id}')">在岗</span>
        </div>
        <div class="flex justify-between mt-1"><span class="text-gray-500">${statusText}</span><span class="font-bold">${s.currentLoad}单</span></div>
      </div>`;
    };
    mList.innerHTML = allStaff.filter(s=>s.role==='makeup').map(build).join('')||'<span class="text-xs text-gray-400">暂无</span>';
    pList.innerHTML = allStaff.filter(s=>s.role==='photo').map(build).join('')||'<span class="text-xs text-gray-400">暂无</span>';
  }

  // ========== 轨道渲染（六轨全量） ==========
  function renderTracks() {
    const container = document.getElementById('trackContainer');
    let html = '';
    TRACKS.forEach(track => {
      const orders = allOrders.filter(o=>o.currentTrack===track.id);
      let sorted = [...orders];
      if (track.key==='selection' && settings.selectionMode==='inStore') sorted.sort((a,b)=>a.timestamp-b.timestamp);
      else sorted.sort((a,b)=>b.timestamp-a.timestamp);

      let extraHeader = '';
      if (track.key==='selection') {
        extraHeader = `
        <div class="mt-2 flex flex-col gap-1 text-xs bg-gray-50 rounded-lg p-2 border">
          <div class="flex items-center gap-2">
            <span class="font-semibold">模式</span>
            <select onchange="updateSetting('selectionMode',this.value)" class="border rounded px-1 py-0.5 text-xs">
              <option value="inStore" ${settings.selectionMode==='inStore'?'selected':''}>店内</option>
              <option value="remote" ${settings.selectionMode==='remote'?'selected':''}>离店</option>
            </select>
          </div>
          <div class="flex items-center gap-1 flex-wrap">
            <span class="font-semibold">单价</span>
            <label class="text-gray-500 text-xs">标</label><input type="number" value="${settings.priceStandard}" class="w-10 border rounded px-1 py-0.5 text-xs" onchange="updateSetting('priceStandard',this.value)">
            <label class="text-gray-500 text-xs">超</label><input type="number" value="${settings.pricePremium}" class="w-10 border rounded px-1 py-0.5 text-xs" onchange="updateSetting('pricePremium',this.value)">
            <label class="text-gray-500 text-xs">商</label><input type="number" value="${settings.priceCommercial}" class="w-10 border rounded px-1 py-0.5 text-xs" onchange="updateSetting('priceCommercial',this.value)">
          </div>
        </div>`;
      }

      html += `
      <div class="track-column flex flex-col h-full ${currentMobileTab !== track.id ? 'hidden' : ''} lg:block" data-track-id="${track.id}">
        <div class="track-header">
          <span class="font-bold text-xs">${track.icon} ${track.name}</span>
          <span class="track-badge" id="badge-${track.id}" style="display:inline-block;min-width:24px;height:24px;background:#1a1a2e;color:#fff;border-radius:50%;font-size:12px;line-height:24px;text-align:center;">${sorted.length}</span>
          ${extraHeader}
        </div>
        <div class="track-body no-scrollbar">${sorted.map(o => buildCard(o, track)).join('')}</div>
      </div>`;
    });
    container.innerHTML = html;
    document.querySelectorAll('.order-card').forEach(card => {
      card.addEventListener('click', function(e) {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
        const orderId = this.dataset.orderId;
        if (orderId) openInfoPatchModal(orderId);
      });
    });
  }

  // ========== 卡片构建 ==========
  function buildCard(o, track) {
    let typeTag = '';
    if (o.type==='makeup_only') typeTag = '<span class="text-xs bg-orange-100 text-orange-800 px-1 rounded">💄仅妆</span>';
    else if (o.type==='rental') typeTag = '<span class="text-xs bg-blue-100 text-blue-800 px-1 rounded">👗外借</span>';
    else if (o.type==='photo_only') typeTag = '<span class="text-xs bg-green-100 text-green-800 px-1 rounded">📷仅拍</span>';

    let payStatus = o.paymentMethod ? `<span class="text-gray-500 text-xs">${o.paymentMethod}</span>` : `<span class="text-copper text-xs">💳未对账</span>`;
    let phoneStatus = o.phone ? '' : `<span class="text-copper text-xs ml-1">✍️缺电话</span>`;
    let nameStatus = (!o.name || o.name==='匿名散客') ? `<span class="text-copper text-xs ml-1">👤缺姓名</span>` : '';

    let wechat = '';
    if (track.key==='selection' && settings.selectionMode==='remote') {
      wechat = o.wechatAdded ? '<span class="text-green-500 text-xs">💚已加微信</span>' : `<span class="text-gray-400 text-xs cursor-pointer" onclick="event.stopPropagation();markWechat('${o.id}')">🔘未加</span>`;
    }
    let rental = '';
    if (o.type==='rental' && track.key==='selection') {
      rental = !o.rentalDepositPaid ? `<div class="text-xs text-copper mt-1">⚠️押金未登记 <button class="btn-action btn-copper" onclick="event.stopPropagation();openDeposit('${o.id}')">登记</button></div>` : `<div class="text-xs text-green-600 mt-1">✅已收押金¥${o.depositAmount} ${o.rentalReturned?'已还':'未还'} ${!o.rentalReturned?`<button class="btn-action btn-green ml-1" onclick="event.stopPropagation();returnRental('${o.id}')">归还</button>`:''}</div>`;
    }

    // 选片计价器（死锁不换行）
    let price = '';
    if (track.key==='selection' && settings.selectionMode==='inStore') {
      price = `<div class="mt-2 flex items-center justify-between flex-nowrap w-full gap-1 text-xs" onclick="event.stopPropagation()">
        <select onchange="setRetouch('${o.id}',this.value)" class="text-xs border rounded px-1 py-0.5 flex-shrink-0">
          <option value="standard" ${o.retouchLevel==='standard'?'selected':''}>标准¥${settings.priceStandard}</option>
          <option value="premium" ${o.retouchLevel==='premium'?'selected':''}>超精¥${settings.pricePremium}</option>
          <option value="commercial" ${o.retouchLevel==='commercial'?'selected':''}>商业¥${settings.priceCommercial}</option>
        </select>
        <div class="flex items-center gap-1 flex-shrink-0">
          <button class="qty-btn" onclick="changeExtra('${o.id}',-1)">−</button><span class="mx-1 font-bold">${o.extraPhotos}</span><button class="qty-btn" onclick="changeExtra('${o.id}',1)">+</button>
        </div>
        <span class="font-bold flex-shrink-0 whitespace-nowrap" style="color:var(--copper);">+¥${o.extraCost}</span>
      </div>`;
    }

    // 技师指派下拉（动态读取运力墙）
    let assignDropdown = '';
    if (track.key==='styling') {
      const makeupStaff = allStaff.filter(s => s.role === 'makeup');
      const currentName = o.makeupArtistId ? (allStaff.find(s => s.id === o.makeupArtistId)?.name || '') : '';
      assignDropdown = makeupStaff.length ? `<select class="text-xs border rounded mt-1 w-full" onchange="assignStaff('${o.id}','makeup',this.value)">
        <option value="">${currentName || '选择化妆师'}</option>
        ${makeupStaff.map(s => `<option value="${s.id}" ${o.makeupArtistId===s.id?'selected':''}>${s.name}</option>`).join('')}
      </select>` : '<span class="text-xs text-gray-400">无化妆师</span>';
    }
    if (track.key==='shooting') {
      const photoStaff = allStaff.filter(s => s.role === 'photo');
      const currentName = o.photographerId ? (allStaff.find(s => s.id === o.photographerId)?.name || '') : '';
      assignDropdown = photoStaff.length ? `<select class="text-xs border rounded mt-1 w-full" onchange="assignStaff('${o.id}','photo',this.value)">
        <option value="">${currentName || '选择摄影师'}</option>
        ${photoStaff.map(s => `<option value="${s.id}" ${o.photographerId===s.id?'selected':''}>${s.name}</option>`).join('')}
      </select>` : '<span class="text-xs text-gray-400">无摄影师</span>';
    }

    const nextTrack = getNextTrack(track.id);
    const canMove = checkMovePermission(o, track.id);
    let moveBtn = '';
    if (nextTrack && canMove) moveBtn = `<button class="btn-action btn-green mt-1" onclick="event.stopPropagation();moveToNext('${o.id}')">➔ 进入${TRACKS.find(t=>t.id===nextTrack).name}</button>`;
    else if (nextTrack && !canMove) moveBtn = `<button class="btn-action btn-disabled mt-1" disabled>需补全信息</button>`;

    return `
    <div class="order-card" data-order-id="${o.id}" id="card-${o.id}">
      <div class="flex justify-between items-start">
        <span class="channel-tag" style="background:linear-gradient(135deg,#ede9fe,#f3e8ff);color:#7c3aed;padding:2px 6px;border-radius:12px;font-size:10px;">${o.channel||'散客'}</span>
        ${typeTag}
      </div>
      <div class="font-bold text-sm mt-1">${o.flowNumber} ${o.name||'匿名'}</div>
      <div class="text-xs text-gray-500 flex flex-wrap items-center gap-1">
        <span>📱${o.phone||'无'}</span>${phoneStatus}${nameStatus}
        <span>💰定金¥${o.deposit||0}</span>${payStatus}
      </div>
      ${wechat}${rental}${price}${assignDropdown}
      <div class="flex flex-wrap gap-1 mt-2">
        ${moveBtn}
        ${(track.key==='selection'||track.key==='delivery')?`<button class="btn-action" onclick="event.stopPropagation();printOrder('${o.id}')">🖨️打印</button>`:''}
      </div>
    </div>`;
  }

  function getNextTrack(currentId) { const idx = TRACKS.findIndex(t=>t.id===currentId); return idx<TRACKS.length-1?TRACKS[idx+1].id:null; }
  function checkMovePermission(o, trackId) {
    if (trackId==='track1' && !o.paymentMethod) return false;
    if (!o.name || o.name==='匿名散客' || !o.phone) return false;
    return true;
  }

  // ========== 信息补全弹窗 ==========
  window.openInfoPatchModal = (orderId) => {
    const o = allOrders.find(x=>x.id===orderId);
    if (!o) return;
    const content = document.getElementById('customModalContent');
    content.innerHTML = `
      <h3 class="font-bold text-lg mb-4">📝 客户信息补全</h3>
      <div class="space-y-3 text-sm text-left">
        <div><label class="font-semibold block mb-1">客户姓名</label><input type="text" id="patchName" value="${o.name||''}" class="w-full px-3 py-2 border rounded" onkeydown="if(event.key==='Enter')submitPatchInfo('${orderId}')"></div>
        <div><label class="font-semibold block mb-1">联系电话</label><input type="text" id="patchPhone" value="${o.phone||''}" maxlength="11" class="w-full px-3 py-2 border rounded" onkeydown="if(event.key==='Enter')submitPatchInfo('${orderId}')"></div>
        <div><label class="font-semibold block mb-1">定金金额</label><input type="number" id="patchDeposit" value="${o.deposit||0}" class="w-full px-3 py-2 border rounded" onkeydown="if(event.key==='Enter')submitPatchInfo('${orderId}')"></div>
        <div><label class="font-semibold block mb-1">支付方式</label>
          <select id="patchPayment" class="w-full px-3 py-2 border rounded" onkeydown="if(event.key==='Enter')submitPatchInfo('${orderId}')">
            <option value="">未选择</option><option value="微信" ${o.paymentMethod==='微信'?'selected':''}>微信</option><option value="支付宝" ${o.paymentMethod==='支付宝'?'selected':''}>支付宝</option><option value="现金" ${o.paymentMethod==='现金'?'selected':''}>现金</option><option value="刷卡" ${o.paymentMethod==='刷卡'?'selected':''}>刷卡</option>
          </select>
        </div>
        <div><label class="font-semibold block mb-1">客源渠道</label>
          <div class="flex gap-2 items-center">
            <select id="patchChannelSelect" class="flex-1 px-3 py-2 border rounded" onchange="document.getElementById('patchChannelCustom').value=this.value" onkeydown="if(event.key==='Enter')submitPatchInfo('${orderId}')">
              <option value="">选择渠道</option><option value="抖音" ${o.channel==='抖音'?'selected':''}>抖音</option><option value="小红书" ${o.channel==='小红书'?'selected':''}>小红书</option><option value="美团" ${o.channel==='美团'?'selected':''}>美团</option><option value="自进店" ${o.channel==='自进店'?'selected':''}>自进店</option><option value="导游带单" ${o.channel==='导游带单'?'selected':''}>导游带单</option>
            </select>
            <input type="text" id="patchChannelCustom" value="${o.channel||''}" class="flex-1 px-3 py-2 border rounded" onkeydown="if(event.key==='Enter')submitPatchInfo('${orderId}')">
          </div>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button class="btn-action" onclick="closeModal()">取消</button>
        <button class="btn-action btn-green" onclick="submitPatchInfo('${orderId}')">确认保存并更新账目</button>
      </div>
    `;
    document.getElementById('customModal').classList.remove('hidden');
  };

  window.submitPatchInfo = async (orderId) => {
    const o = allOrders.find(x=>x.id===orderId);
    if (!o) return;
    const name = document.getElementById('patchName').value.trim();
    const phone = document.getElementById('patchPhone').value.trim();
    const deposit = parseFloat(document.getElementById('patchDeposit').value) || 0;
    const payment = document.getElementById('patchPayment').value;
    let channel = document.getElementById('patchChannelCustom').value.trim();
    if (!channel) channel = document.getElementById('patchChannelSelect').value;
    if (!channel) channel = '散客';
    o.name = name || '匿名散客'; o.phone = phone; o.deposit = deposit;
    o.paymentMethod = payment || null; o.channel = channel;
    o.totalAmount = deposit + (o.extraCost||0) + (o.depositAmount||0);
    await dbPut('orders', o);
    closeModal();
    refreshDashboard();
  };

  // ========== 业务流程 ==========
  window.moveToNext = async (orderId) => {
    const o = allOrders.find(x=>x.id===orderId);
    if (!o) return;
    const nextId = getNextTrack(o.currentTrack);
    if (!nextId) return;
    if (o.currentTrack==='track1' && !o.paymentMethod) { showModal('支付未对账','请先选择支付方式'); return; }
    if (!o.name || o.name==='匿名散客' || !o.phone) { showModal('信息不全','请补全客户姓名和电话'); return; }
    if (o.currentTrack==='track3') o.makeupArtistId = null;
    if (o.currentTrack==='track4') o.photographerId = null;
    o.currentTrack = nextId; o.timestamp = Date.now();
    await dbPut('orders', o); refreshDashboard();
  };

  window.assignStaff = async (orderId, roleType, staffId) => {
    const o = allOrders.find(x=>x.id===orderId);
    if (!o || !staffId) return;
    if (roleType === 'makeup') o.makeupArtistId = staffId;
    else if (roleType === 'photo') o.photographerId = staffId;
    await dbPut('orders', o); refreshDashboard();
  };

  window.toggleLeaveConfirm = (staffId) => {
    const s = allStaff.find(x=>x.id===staffId);
    if (!s) return;
    if (s.currentLoad > 0) { showModal('无法下班','该人员仍在服务中，请先完成手头订单'); return; }
    showModal('确认下班', `确定让 ${s.name} 下班并移除？`, 'confirm', async () => {
      allStaff = allStaff.filter(x=>x.id!==staffId);
      await dbDelete('staff', staffId);
      refreshDashboard();
    });
  };

  window.markWechat = async (orderId) => { const o = allOrders.find(x=>x.id===orderId); if(o){ o.wechatAdded=true; await dbPut('orders',o); refreshDashboard(); } };
  window.openDeposit = (orderId) => {
    const o = allOrders.find(x=>x.id===orderId);
    if (!o) return;
    const content = document.getElementById('customModalContent');
    content.innerHTML = `<h3 class="font-bold text-lg mb-3">押金登记</h3><input type="number" id="depAmt" class="w-full border rounded px-3 py-2" placeholder="金额" onkeydown="if(event.key==='Enter')confirmDeposit('${orderId}')"><div class="flex gap-2 justify-end mt-3"><button class="btn-action" onclick="closeModal()">取消</button><button class="btn-action btn-copper" onclick="confirmDeposit('${orderId}')">确认</button></div>`;
    document.getElementById('customModal').classList.remove('hidden');
  };
  window.confirmDeposit = async (orderId) => { const o = allOrders.find(x=>x.id===orderId); if(!o) return; const amt = parseFloat(document.getElementById('depAmt').value)||0; o.rentalDepositPaid=true; o.depositAmount=amt; o.totalAmount+=amt; await dbPut('orders',o); closeModal(); refreshDashboard(); };
  window.returnRental = async (orderId) => { const o = allOrders.find(x=>x.id===orderId); if(o){ o.rentalReturned=true; await dbPut('orders',o); refreshDashboard(); } };
  window.setRetouch = async (orderId, level) => { const o = allOrders.find(x=>x.id===orderId); if(o){ o.retouchLevel=level; calcExtra(o); await dbPut('orders',o); refreshDashboard(); } };
  window.changeExtra = async (orderId, delta) => { const o = allOrders.find(x=>x.id===orderId); if(o){ o.extraPhotos=Math.max(0,(o.extraPhotos||0)+delta); calcExtra(o); await dbPut('orders',o); refreshDashboard(); } };
  function calcExtra(o) { const map={standard:settings.priceStandard,premium:settings.pricePremium,commercial:settings.priceCommercial}; o.extraCost=o.extraPhotos*(map[o.retouchLevel]||settings.priceStandard); o.totalAmount=(o.deposit||0)+o.extraCost+(o.depositAmount||0); }

  window.updateSetting = async (key, val) => {
    settings[key] = isNaN(parseFloat(val)) ? val : parseFloat(val);
    await dbPut('settings', { key, value: settings[key] });
    allOrders.forEach(o => calcExtra(o));
    await Promise.all(allOrders.map(o => dbPut('orders', o)));
    refreshDashboard();
  };

  // ========== 渠道对账（刚性轧账报表） ==========
  window.openChannelReport = () => {
    const today = new Date().toISOString().split('T')[0];
    const orders = allOrders.filter(o=>o.date===today);
    const payStats = {}, chanStats = {};
    let totalRevenue = 0, totalExtra = 0, totalDeposit = 0;
    orders.forEach(o => {
      const pm = o.paymentMethod || '未知';
      payStats[pm] = (payStats[pm]||0) + (o.deposit||0)+(o.extraCost||0)+(o.depositAmount||0);
      const ch = o.channel||'散客';
      if(!chanStats[ch]) chanStats[ch]={count:0,total:0};
      chanStats[ch].count++; chanStats[ch].total += (o.deposit||0)+(o.extraCost||0)+(o.depositAmount||0);
      totalDeposit += (o.deposit||0);
      totalExtra += (o.extraCost||0);
    });
    totalRevenue = totalDeposit + totalExtra;
    const assumedPartTimerCost = 0; // 默认无兼职成本，实际可读取存储的兼职单数
    const netProfit = totalRevenue - assumedPartTimerCost;
    let payHtml='', chanHtml='';
    for(const [k,v] of Object.entries(payStats)) payHtml+=`<tr><td class="p-1">${k}</td><td class="text-right">¥${v.toLocaleString()}</td></tr>`;
    for(const [k,v] of Object.entries(chanStats)) chanHtml+=`<tr><td class="p-1">${k}</td><td class="text-right">${v.count}单</td><td class="text-right">¥${v.total.toLocaleString()}</td></tr>`;
    const content = document.getElementById('customModalContent');
    content.innerHTML = `<h3 class="font-bold text-lg mb-3">📋 今日财务轧账报表</h3>
      <p class="font-semibold text-sm">账单A：支付通道实收单</p><table class="w-full text-xs mb-3">${payHtml||'<tr><td colspan="2">无</td></tr>'}</table>
      <p class="font-semibold text-sm">账单B：业务成本与纯利润单</p>
      <div class="text-xs space-y-1 mb-3">
        <div class="flex justify-between"><span>今日总流水 (定金+加选)</span><span class="font-bold">¥${totalRevenue.toLocaleString()}</span></div>
        <div class="flex justify-between"><span>今日应付兼职总工费</span><span>¥${assumedPartTimerCost.toLocaleString()}</span></div>
        <div class="flex justify-between border-t pt-1 mt-1 font-bold text-base"><span>今日门店纯利润</span><span style="color:var(--green);">¥${netProfit.toLocaleString()}</span></div>
      </div>
      <p class="font-semibold text-sm mt-3">客源渠道统计</p><table class="w-full text-xs">${chanHtml||'<tr><td colspan="3">无</td></tr>'}</table>
      <button class="btn-action btn-green mt-3" onclick="closeModal()">关闭</button>`;
    document.getElementById('customModal').classList.remove('hidden');
  };

  // ========== 呼叫兼职（工种细分） ==========
  window.openCallModal = () => {
    const content = document.getElementById('customModalContent');
    content.innerHTML = `<h3 class="font-bold text-lg mb-3">📣 呼叫外部兼职 (潮汐客流突发应急)</h3>
      <div class="space-y-3 text-sm">
        <div><label class="font-semibold block mb-2">工种细分</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2"><input type="radio" name="callRole" value="makeup" checked> 💄 外部化妆师</label>
            <label class="flex items-center gap-2"><input type="radio" name="callRole" value="photo"> 📷 外部摄影师</label>
          </div>
        </div>
        <div><label>工费</label><input id="basePay" value="200" class="w-full border rounded px-3 py-2"></div>
        <div><label>风格</label><select id="styleSelect" class="w-full border rounded px-3 py-2">
          <optgroup label="化妆"><option>傣族重工</option><option>敦煌飞天</option><option>苗族银饰</option><option>大唐古风</option><option>清宫旗头</option><option>西域公主</option><option>战国袍</option><option>现代高奢</option></optgroup>
          <optgroup label="摄影"><option>暮光夜景</option><option>日系复古</option><option>新中式国潮</option><option>纪实情绪</option><option>法式浪漫</option><option>纪实旅拍</option><option>高级大片</option></optgroup>
        </select></div>
        <div class="flex items-center gap-2"><input type="checkbox" id="commToggle" checked> <label>提成</label></div>
        <div><label>提成%</label><input id="commPercent" value="20" class="w-full border rounded px-3 py-2"></div>
      </div>
      <div class="flex gap-2 justify-end mt-4"><button class="btn-action" onclick="closeModal()">取消</button><button class="btn-action btn-copper" onclick="confirmCall()">发布</button></div>`;
    document.getElementById('customModal').classList.remove('hidden');
  };
  window.confirmCall = () => {
    const roleEl = document.querySelector('input[name="callRole"]:checked');
    const role = roleEl ? roleEl.value : 'makeup';
    const bp=document.getElementById('basePay')?.value||'200';
    const s=document.getElementById('styleSelect')?.value||'';
    const c=document.getElementById('commToggle')?.checked;
    const p=document.getElementById('commPercent')?.value||'20';
    closeModal();
    showModal('发布成功', `已发布：${role==='makeup'?'外部化妆师':'外部摄影师'}，${s}风格，工费¥${bp}，${c?`提成${p}%`:''}。提成仅接单后显示。`);
  };

  // ========== 打印 ==========
  window.printOrder = (orderId) => {
    const o = allOrders.find(x=>x.id===orderId); if(!o) return;
    const level = {standard:'标准精修',premium:'超精修',commercial:'商业精修'};
    document.getElementById('printArea').innerHTML = `<div style="font-family:'PingFang SC','Microsoft YaHei',sans-serif;"><h3 style="text-align:center;border-bottom:2px solid #000;">旅拍档期派 · 双联单据</h3><table class="print-table"><tr><td><b>流水号</b></td><td>${o.flowNumber}</td><td><b>渠道</b></td><td>${o.channel}</td></tr><tr><td><b>客户</b></td><td>${o.name}</td><td><b>电话</b></td><td>${o.phone}</td></tr><tr><td><b>精修</b></td><td>${level[o.retouchLevel]}</td><td><b>加选</b></td><td>${o.extraPhotos}张</td></tr><tr><td><b>加选费</b></td><td>¥${o.extraCost}</td><td><b>押金</b></td><td>¥${o.depositAmount||0}</td></tr><tr><td><b>总金额</b></td><td>¥${o.totalAmount}</td><td><b>状态</b></td><td>${o.currentTrack==='track6'?'已结算':'进行中'}</td></tr></table><div style="margin-top:12px;display:flex;justify-content:space-between;"><span>选片师：________</span><span>客户：________</span></div></div>`;
    document.getElementById('printArea').style.display = 'block';
    setTimeout(() => { window.print(); setTimeout(() => document.getElementById('printArea').style.display = 'none', 500); }, 200);
  };

  // ========== 备份导入导出 ==========
  window.exportBackup = async () => {
    const [orders, staff, settings] = await Promise.all([dbGetAll('orders'), dbGetAll('staff'), dbGetAll('settings')]);
    const backup = { orders, staff, settings, exportDate: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日`;
    const a = document.createElement('a'); a.href = url; a.download = `旅拍档期派封账备份_${dateStr}.json`; a.click();
    URL.revokeObjectURL(url);
    showModal('导出成功', '全量封账数据已下载至本地');
  };

  window.importBackup = () => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const backup = JSON.parse(text);
        if (!backup.orders || !backup.staff) throw new Error('数据格式无效');
        await dbClear('orders'); await dbClear('staff'); await dbClear('settings');
        for (const o of backup.orders) await dbPut('orders', o);
        for (const s of backup.staff) await dbPut('staff', s);
        for (const s of backup.settings) await dbPut('settings', s);
        showModal('导入成功', '历史备份已一键恢复，正在刷新视图');
        refreshDashboard();
      } catch (err) {
        showModal('导入失败', '文件格式不正确或数据已损坏');
      }
    };
    input.click();
  };

  // 手机标签切换
  document.getElementById('mobileTabs').addEventListener('click', (e) => {
    if (e.target.classList.contains('tab-btn')) {
      currentMobileTab = e.target.dataset.track;
      renderTracks();
      updateMobileTabActive();
    }
  });

  // 初始化
  (async () => {
    await openDB();
    await loadData();
    const saved = sessionStorage.getItem('role');
    if (saved==='boss'||saved==='staff') { role=saved; document.getElementById('authOverlay').classList.add('hidden'); applyRole(); }
    refreshDashboard();
  })();
})();
</script>
</body>
</html>
