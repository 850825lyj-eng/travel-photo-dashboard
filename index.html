<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>旅拍档期派 · 商家控制台</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <style>
    :root {
      --bg: #F8F9FA;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --green: #00C853;
      --yellow: #FFE100;
      --copper: #D84315;
      --text: #1a1a2e;
      --glass: rgba(255, 255, 255, 0.78);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.05);
      --shadow-glow-green: 0 0 20px rgba(0, 200, 83, 0.35), 0 0 6px rgba(0, 200, 83, 0.2);
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .topnav-glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      z-index: 100;
    }
    .staff-wall {
      background: var(--card);
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      z-index: 50;
    }
    .staff-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all 0.25s;
      position: relative;
    }
    .staff-card.overload-warn {
      border-color: var(--yellow) !important;
      animation: breatheYellow 0.7s infinite;
    }
    @keyframes breatheYellow {
      0%,100%{ box-shadow: 0 0 10px rgba(255,225,0,0.3); border-color: #ffe100; }
      50%{ box-shadow: 0 0 28px rgba(255,225,0,0.7); border-color: #ffc107; }
    }
    .track-column {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: 0.2s;
    }
    .track-column.drag-over {
      border-color: var(--green) !important;
      background: #fafffb !important;
    }
    .track-column.track-disabled {
      opacity: 0.45;
      pointer-events: none;
      background: #f0f0f0 !important;
      border-style: dashed !important;
    }
    .track-header {
      flex-shrink: 0;
      padding: 12px 8px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      z-index: 2;
    }
    .track-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      border-radius: 999px;
      background: #1a1a2e;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 0 8px;
      margin-left: 4px;
    }
    .track-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 0;
    }
    .order-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      cursor: grab;
      box-shadow: var(--shadow-sm);
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      flex-shrink: 0;
      font-size: 13px;
    }
    .order-card:active { cursor: grabbing; }
    .order-card.dragging { opacity: 0.55; transform: scale(0.94); }
    .btn-action {
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn-action.btn-green { background: #e8f5e9; border-color: #a5d6a7; color: #1b5e20; }
    .btn-action.btn-copper { background: #fbe9e7; border-color: #ffab91; color: #bf360c; }
    .btn-action.btn-disabled { opacity: 0.4; pointer-events: none; background: #eee; }
    .price-calc {
      background: #fafafa;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      border: 1px dashed #e0e0e0;
      font-size: 11px;
    }
    .qty-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-lg);
      max-width: 640px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }
    @media print {
      body * { visibility: hidden !important; }
      #printArea, #printArea * { visibility: visible !important; }
      #printArea {
        position: fixed !important;
        left: 0;
        top: 0;
        width: 100%;
        max-width: 297mm;
        min-height: 190mm;
        max-height: 210mm;
        padding: 8mm 10mm;
        background: #fff;
        z-index: 99999;
        font-size: 10px;
        color: #000;
      }
      #printArea .print-table { width: 100%; border-collapse: collapse; }
      #printArea .print-table td { border: 0.5px solid #999; padding: 4px 6px; }
      @page { size: A4 landscape; margin: 2mm; }
    }
  </style>
</head>
<body class="h-screen flex flex-col">

  <!-- 登录遮罩 -->
  <div id="authOverlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-white/80 backdrop-blur-xl">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-80 text-center">
      <div class="text-3xl font-bold mb-2" style="color:var(--green);">旅拍档期派</div>
      <div class="text-xs text-gray-400 mb-6">商家控制台</div>
      <input type="password" id="passwordInput" placeholder="请输入密码" class="w-full px-4 py-3 border rounded-xl mb-4 text-sm outline-none">
      <button id="loginBtn" class="w-full py-3 rounded-xl text-white font-bold" style="background:var(--green);">进入控制台</button>
      <p class="text-xs text-gray-400 mt-4">staff888(员工) / boss999(老板)</p>
    </div>
  </div>

  <!-- 顶部导航 -->
  <header class="topnav-glass flex items-center justify-between px-5 py-3 flex-shrink-0 gap-4 flex-wrap">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-extrabold" style="background:linear-gradient(135deg,#00C853,#00a844);">派</div>
      <div>
        <h1 class="text-base font-bold text-gray-900">旅拍档期派 · 商家控制台</h1>
        <p class="text-xs text-gray-500">LIVE SCHEDULING</p>
      </div>
    </div>
    <button onclick="openCallPartTimer()" class="px-4 py-2 rounded-xl font-bold shadow-md text-sm flex items-center justify-center" style="background:#fff; border:2px solid var(--yellow); color:#1a1a2e;">一键呼叫外部兼职</button>
    <div class="flex items-center gap-3">
      <div class="text-right"><span class="text-xs text-gray-500 block">今日营业额</span><span class="text-2xl font-extrabold" style="color:var(--green);" id="todayRevenue">¥0</span></div>
      <button onclick="openChannelManager()" id="channelBtn" class="btn-action">📋 渠道</button>
      <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500 underline">退出</button>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0 min-w-[260px]">
      <input type="text" id="quickInput" placeholder="盲打：姓名 电话 定金 渠道" class="flex-1 px-4 py-2.5 rounded-xl border text-sm bg-white/80 outline-none">
      <button onclick="handleQuickInput()" class="px-4 py-2.5 rounded-xl text-white font-bold" style="background:var(--green);">↵</button>
    </div>
  </header>

  <!-- 主体三栏 -->
  <div class="flex flex-1 overflow-hidden" style="min-height:0;">
    <aside class="staff-wall w-[15%] min-w-[160px] flex flex-col overflow-y-auto flex-shrink-0 p-3 gap-3" id="staffWall">
      <div class="text-xs font-bold text-gray-500 uppercase text-center">💄 化妆师</div>
      <div id="makeupStaffList" class="flex flex-col gap-2"></div>
      <hr class="my-2 border-gray-200">
      <div class="text-xs font-bold text-gray-500 uppercase text-center">📷 摄影师</div>
      <div id="photoStaffList" class="flex flex-col gap-2"></div>
      <div class="mt-auto pt-4 text-center space-x-3">
        <button onclick="addStaff('makeup')" class="text-xs text-gray-400 hover:text-gray-600 underline">+ 添化妆师</button>
        <button onclick="addStaff('photo')" class="text-xs text-gray-400 hover:text-gray-600 underline">+ 添摄影师</button>
      </div>
    </aside>
    <main class="flex-1 flex gap-3 p-3 overflow-hidden" id="trackContainer"></main>
  </div>

  <!-- 弹窗容器 -->
  <div id="settingsModal" class="modal-overlay hidden"></div>
  <div id="channelModal" class="modal-overlay hidden"></div>
  <div id="callPartTimerModal" class="modal-overlay hidden"></div>
  <div id="depositModal" class="modal-overlay hidden"></div>
  <div id="printArea" style="display:none;"></div>

  <script>
    (() => {
      // ==================== IndexedDB ====================
      const DB_NAME = 'TravelPhotoScheduler';
      let db;
      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains('orders')) d.createObjectStore('orders', { keyPath: 'id' });
            if (!d.objectStoreNames.contains('staff')) d.createObjectStore('staff', { keyPath: 'id' });
            if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'key' });
          };
          req.onsuccess = (e) => { db = e.target.result; resolve(db); };
          req.onerror = (e) => reject(e.target.error);
        });
      }
      function dbPut(store, data) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readwrite');
          tx.objectStore(store).put(data);
          tx.oncomplete = () => resolve();
          tx.onerror = e => reject(e.target.error);
        });
      }
      function dbGetAll(store) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readonly');
          const req = tx.objectStore(store).getAll();
          req.onsuccess = () => resolve(req.result);
          req.onerror = e => reject(e.target.error);
        });
      }
      function dbDelete(store, id) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readwrite');
          tx.objectStore(store).delete(id);
          tx.oncomplete = () => resolve();
          tx.onerror = e => reject(e.target.error);
        });
      }

      // ==================== 权限 ====================
      const PASS = { staff: 'staff888', boss: 'boss999' };
      let role = null;
      function applyRole() {
        if (role === 'staff') {
          document.getElementById('todayRevenue').textContent = '***';
          document.getElementById('channelBtn').classList.add('btn-disabled');
          document.getElementById('channelBtn').onclick = () => alert('员工权限不足');
        } else {
          document.getElementById('channelBtn').classList.remove('btn-disabled');
          document.getElementById('channelBtn').onclick = openChannelManager;
        }
      }
      document.getElementById('loginBtn').onclick = () => {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd === PASS.boss) { role = 'boss'; sessionStorage.setItem('role','boss'); document.getElementById('authOverlay').classList.add('hidden'); applyRole(); refreshDashboard(); }
        else if (pwd === PASS.staff) { role = 'staff'; sessionStorage.setItem('role','staff'); document.getElementById('authOverlay').classList.add('hidden'); applyRole(); refreshDashboard(); }
        else alert('密码错误');
      };
      window.logout = () => { sessionStorage.removeItem('role'); location.reload(); };

      // ==================== 数据模型 ====================
      const TRACKS = [
        { id: 'track1', name: '预约到店', icon: '📋', key: 'appointment' },
        { id: 'track2', name: '选衣确认', icon: '👗', key: 'cloth' },
        { id: 'track3', name: '妆造中',   icon: '💄', key: 'styling' },
        { id: 'track4', name: '指派摄影', icon: '📷', key: 'shooting' },
        { id: 'track5', name: '选片',     icon: '🖼️', key: 'selection' },
        { id: 'track6', name: '精修交付', icon: '✅', key: 'delivery' }
      ];
      let allOrders = [], allStaff = [], flowCounter = 0;
      let settings = { selectionMode: 'inStore', priceStandard: 40, pricePremium: 60, priceCommercial: 100 };

      function defStaff() {
        return [
          { id: 'staff_m1', name: '化妆师·琳达', role: 'makeup', status: 'idle', currentLoad: 0 },
          { id: 'staff_m2', name: '化妆师·小雅', role: 'makeup', status: 'idle', currentLoad: 0 },
          { id: 'staff_p1', name: '摄影师·阿杰', role: 'photo', status: 'idle', currentLoad: 0 },
          { id: 'staff_p2', name: '摄影师·浩然', role: 'photo', status: 'idle', currentLoad: 0 }
        ];
      }
      function defOrders() {
        const t = new Date().toISOString().split('T')[0];
        return [
          { id: 'o1', flowNumber: '#001', name: '张美琳', phone: '13800001111', deposit: 300, channel: '美团', type: 'comprehensive', currentTrack: 'track1', timestamp: Date.now()-3600000, wechatAdded: false, makeupArtistId: null, photographerId: null, depositAmount: 0, rentalReturned: false, extraPhotos: 0, retouchLevel: 'standard', extraCost: 0, totalAmount: 300, date: t, rentalDepositPaid: false },
          { id: 'o2', flowNumber: '#002', name: '李思远', phone: '13900002222', deposit: 500, channel: '导游小陈', type: 'photo_only', currentTrack: 'track4', timestamp: Date.now()-1800000, wechatAdded: true, makeupArtistId: null, photographerId: 'staff_p1', depositAmount: 0, rentalReturned: false, extraPhotos: 5, retouchLevel: 'premium', extraCost: 300, totalAmount: 800, date: t, rentalDepositPaid: false }
        ];
      }

      // ==================== 核心数据加载 ====================
      async function loadInitialData() {
        const [orders, staff, sets] = await Promise.all([dbGetAll('orders'), dbGetAll('staff'), dbGetAll('settings')]);
        if (!orders.length && !staff.length) {
          allStaff = defStaff(); allOrders = defOrders();
          for (const s of allStaff) await dbPut('staff', s);
          for (const o of allOrders) await dbPut('orders', o);
        } else {
          allStaff = staff.length ? staff : defStaff();
          allOrders = orders;
        }
        if (sets.length) sets.forEach(s => { if (s.key) settings[s.key] = s.value; });
        flowCounter = allOrders.length;
        recalcStaff();
      }
      function recalcStaff() {
        allStaff.forEach(s => { s.currentLoad = 0; s.status = 'idle'; });
        allOrders.forEach(o => {
          if (o.currentTrack === 'track3' && o.makeupArtistId) { const s = allStaff.find(x => x.id === o.makeupArtistId); if (s) s.currentLoad++; }
          if (o.currentTrack === 'track4' && o.photographerId) { const s = allStaff.find(x => x.id === o.photographerId); if (s) s.currentLoad++; }
        });
        allStaff.forEach(s => {
          if (s.currentLoad === 0) s.status = 'idle';
          else if (s.currentLoad === 1) s.status = 'busy';
          else s.status = 'overload';
        });
      }

      // ==================== 万能智能解析器（条件降级拆分） ====================
      function parseInput(raw) {
        const tokens = raw.trim().split(/[\s,，\t]+/).filter(Boolean);
        if (tokens.length === 0) return { name: '匿名散客', phone: '', deposit: 0, channel: '散客' };

        // 最后一个词作为渠道
        let channel = tokens[tokens.length - 1];
        const remainingTokens = tokens.slice(0, -1);

        // 如果最后一个词是纯数字（可能是电话号码或定金），则说明用户可能没有输入渠道，回退处理
        if (/^\d+$/.test(channel)) {
          // 可能是电话号码或定金，重新判断
          if (channel.length === 11 && channel.startsWith('1')) {
            // 最后一个词是电话号码，则没有渠道词
            channel = '散客';
            remainingTokens.push(channel); // 把电话号码放回剩余词元
          } else {
            // 是纯数字但不像电话，可能是定金，但也可能用户忘了渠道，保底为散客
            channel = '散客';
            remainingTokens.push(channel);
          }
        }

        // 从剩余词元中提取电话和定金
        let phone = '';
        let deposit = 0;
        const nameTokens = [];

        for (const token of remainingTokens) {
          if (!phone && /^1[3-9]\d{9}$/.test(token)) {
            phone = token;
          } else if (deposit === 0 && /^\d{1,6}$/.test(token) && parseInt(token) > 0) {
            deposit = parseInt(token);
          } else {
            nameTokens.push(token);
          }
        }

        let name = nameTokens.join('') || '匿名散客';
        if (name.length > 10) name = name.substring(0, 10);

        return { name, phone, deposit, channel };
      }

      // ==================== 全局刷新函数（数据流闭环核心） ====================
      async function refreshDashboard() {
        const orders = await dbGetAll('orders');
        const staff = await dbGetAll('staff');
        allOrders = orders;
        allStaff = staff.length ? staff : defStaff();
        recalcStaff();
        renderAll();
      }

      function renderAll() {
        renderStaffWall();
        renderTracks();
        if (role === 'boss') updateRevenue();
        updateTrackBadges();
      }

      function renderStaffWall() {
        const mList = document.getElementById('makeupStaffList');
        const pList = document.getElementById('photoStaffList');
        const card = (s) => {
          const statusText = s.status === 'idle' ? '🟢空闲' : (s.status === 'busy' ? '🟡忙碌' : '🔴超载');
          const warnClass = s.status === 'overload' ? 'overload-warn' : '';
          return `<div class="staff-card p-2 text-xs ${warnClass}">
            <div class="flex justify-between"><span class="font-semibold truncate">${s.name}</span><button class="text-gray-400 hover:text-red-500 font-bold" onclick="removeStaff('${s.id}')">✕</button></div>
            <div class="flex justify-between mt-1"><span>${statusText}</span><span class="font-bold">${s.currentLoad}单</span></div>
          </div>`;
        };
        mList.innerHTML = allStaff.filter(s => s.role === 'makeup').map(card).join('') || '<p class="text-xs text-gray-400 text-center">暂无</p>';
        pList.innerHTML = allStaff.filter(s => s.role === 'photo').map(card).join('') || '<p class="text-xs text-gray-400 text-center">暂无</p>';
      }

      function renderTracks() {
        const container = document.getElementById('trackContainer');
        let html = '';
        TRACKS.forEach(track => {
          const orders = allOrders.filter(o => o.currentTrack === track.id);
          let sorted = [...orders];
          if (track.key === 'selection' && settings.selectionMode === 'inStore') {
            sorted.sort((a, b) => a.timestamp - b.timestamp);
          } else {
            sorted.sort((a, b) => b.timestamp - a.timestamp);
          }
          let extraHeader = '';
          if (track.key === 'selection') {
            extraHeader = `
            <div class="mt-2 flex flex-wrap items-center justify-center gap-2 text-xs bg-gray-50 rounded-lg p-2 border">
              <select id="inlineSelectionMode" class="px-2 py-1 border rounded text-xs" onchange="updateSetting('selectionMode', this.value)">
                <option value="inStore" ${settings.selectionMode === 'inStore' ? 'selected' : ''}>店内选片</option>
                <option value="remote" ${settings.selectionMode === 'remote' ? 'selected' : ''}>离店自选</option>
              </select>
              <input type="number" value="${settings.priceStandard}" class="w-14 px-1 py-0.5 border rounded text-xs" onchange="updateSetting('priceStandard', this.value)" placeholder="标准">
              <input type="number" value="${settings.pricePremium}" class="w-14 px-1 py-0.5 border rounded text-xs" onchange="updateSetting('pricePremium', this.value)" placeholder="超精">
              <input type="number" value="${settings.priceCommercial}" class="w-14 px-1 py-0.5 border rounded text-xs" onchange="updateSetting('priceCommercial', this.value)" placeholder="商业">
            </div>`;
          }
          html += `
          <div class="track-column flex-1 min-w-[130px]" data-track-id="${track.id}" data-track-key="${track.key}"
               ondragover="handleDragOver(event,'${track.id}','${track.key}')" ondragleave="handleDragLeave(event,'${track.id}')" ondrop="handleDrop(event,'${track.id}','${track.key}')">
            <div class="track-header">
              <span class="track-dot" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);margin-right:6px;"></span>
              <span class="font-bold text-xs">${track.icon} ${track.name}</span>
              <span class="track-badge" id="badge-${track.id}">${sorted.length}</span>
              ${extraHeader}
            </div>
            <div class="track-body">${sorted.map(o => buildCard(o, track)).join('')}</div>
          </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.order-card').forEach(c => {
          c.addEventListener('dragstart', e => { draggingId = e.target.closest('.order-card')?.dataset.orderId; e.target.classList.add('dragging'); });
          c.addEventListener('dragend', e => { e.target.classList.remove('dragging'); draggingId = null; });
        });
      }

      let draggingId = null;
      function buildCard(o, track) {
        let typeTag = '';
        if (o.type === 'makeup_only') typeTag = '<span class="type-tag makeup" style="background:#fff3e0;color:#e65100;padding:2px 7px;border-radius:6px;font-size:10px;">💄仅限妆造</span>';
        else if (o.type === 'rental') typeTag = '<span class="type-tag rental" style="background:#e3f2fd;color:#0d47a1;padding:2px 7px;border-radius:6px;font-size:10px;">👗服装外借</span>';
        else if (o.type === 'photo_only') typeTag = '<span class="type-tag photo" style="background:#e8f5e9;color:#1b5e20;padding:2px 7px;border-radius:6px;font-size:10px;">📷仅限拍摄</span>';

        let wechat = '';
        if (track.key === 'selection' && settings.selectionMode === 'remote') {
          wechat = o.wechatAdded ? '<span class="text-green-500 text-xs">💚已加微信</span>' : `<span class="text-gray-400 text-xs cursor-pointer line-through decoration-red-400" onclick="event.stopPropagation();markWechat('${o.id}')">🔘未加微信</span>`;
        }
        let rental = '';
        if (o.type === 'rental' && track.key === 'selection') {
          if (!o.rentalDepositPaid) rental = `<div class="bg-orange-50 border border-orange-200 rounded p-2 mt-2 text-xs">⚠️押金未登记 <button class="btn-action btn-copper ml-1" onclick="event.stopPropagation();openDeposit('${o.id}')">登记</button></div>`;
          else rental = `<div class="bg-green-50 border border-green-200 rounded p-2 mt-2 text-xs">✅已收押金¥${o.depositAmount} ${o.rentalReturned?'已归还':'👗未还'} ${!o.rentalReturned?`<button class="btn-action btn-green ml-1" onclick="event.stopPropagation();returnRental('${o.id}')">确认归还</button>`:''}</div>`;
        }
        let price = '';
        if (track.key === 'selection' && settings.selectionMode === 'inStore') {
          price = `<div class="price-calc" onclick="event.stopPropagation()">
            <select onchange="setRetouch('${o.id}',this.value)" class="text-xs">
              <option value="standard" ${o.retouchLevel==='standard'?'selected':''}>标准 ¥${settings.priceStandard}</option>
              <option value="premium" ${o.retouchLevel==='premium'?'selected':''}>超精 ¥${settings.pricePremium}</option>
              <option value="commercial" ${o.retouchLevel==='commercial'?'selected':''}>商业 ¥${settings.priceCommercial}</option>
            </select>
            <button class="qty-btn" onclick="changeExtra('${o.id}',-1)">−</button><span class="qty-num">${o.extraPhotos}</span><button class="qty-btn" onclick="changeExtra('${o.id}',1)">+</button>
            <span class="font-bold text-xs ml-auto" style="color:var(--copper);">+¥${o.extraCost}</span>
          </div>`;
        }
        let printBtn = (track.key==='selection'||track.key==='delivery') ? `<button class="btn-action btn-print mt-1" onclick="event.stopPropagation();printOrder('${o.id}')">🖨️打印</button>` : '';
        let skipBtn = (o.type==='makeup_only' && track.key==='styling') ? `<button class="btn-action btn-green mt-1" onclick="event.stopPropagation();skipToDelivery('${o.id}')">⏭️跳过拍摄</button>` : '';
        return `<div class="order-card" draggable="true" data-order-id="${o.id}">
          <span class="channel-tag" style="background:linear-gradient(135deg,#ede9fe,#f3e8ff);color:#7c3aed;padding:3px 8px;border-radius:999px;font-size:10px;">${o.channel||'散客'}</span> ${typeTag}
          <div class="font-bold text-sm mt-1">${o.flowNumber} ${o.name}</div>
          <div class="text-xs text-gray-500">📱${o.phone||'无'} | 💰定金¥${o.deposit||0}</div>
          ${wechat} ${rental} ${price}
          <div class="flex gap-1 flex-wrap mt-1">${skipBtn}${printBtn}</div>
        </div>`;
      }
      function updateTrackBadges() {
        TRACKS.forEach(t => {
          const badge = document.getElementById('badge-'+t.id);
          if (badge) badge.textContent = allOrders.filter(o => o.currentTrack === t.id).length;
        });
      }
      function updateRevenue() {
        if (role !== 'boss') return;
        const today = new Date().toISOString().split('T')[0];
        const total = allOrders.filter(o => o.date === today).reduce((s,o) => s + (o.deposit||0) + (o.extraCost||0) + (o.depositAmount||0), 0);
        document.getElementById('todayRevenue').textContent = '¥' + total.toLocaleString();
      }

      // ==================== 录入闭环 ====================
      window.handleQuickInput = async () => {
        const raw = document.getElementById('quickInput').value.trim();
        if (!raw) return;
        const { name, phone, deposit, channel } = parseInput(raw);
        flowCounter++;
        const today = new Date().toISOString().split('T')[0];
        const newOrder = {
          id: 'order_' + Date.now(),
          flowNumber: '#' + String(flowCounter).padStart(3, '0'),
          name, phone, deposit, channel,
          type: 'comprehensive',
          currentTrack: 'track1',
          timestamp: Date.now(),
          wechatAdded: false,
          makeupArtistId: null,
          photographerId: null,
          depositAmount: 0,
          rentalReturned: false,
          extraPhotos: 0,
          retouchLevel: 'standard',
          extraCost: 0,
          totalAmount: deposit,
          date: today,
          rentalDepositPaid: false
        };
        await dbPut('orders', newOrder);
        document.getElementById('quickInput').value = '';
        await refreshDashboard();
        setTimeout(() => {
          const card = document.getElementById('card-' + newOrder.id);
          if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      };

      // ==================== 设置联动 ====================
      window.updateSetting = async (key, value) => {
        if (key === 'selectionMode') settings.selectionMode = value;
        else settings[key] = parseFloat(value) || 0;
        const data = Object.entries(settings).map(([k, v]) => ({ key: k, value: v }));
        for (const d of data) await dbPut('settings', d);
        allOrders.forEach(o => {
          const map = { standard: settings.priceStandard, premium: settings.pricePremium, commercial: settings.priceCommercial };
          o.extraCost = (o.extraPhotos || 0) * (map[o.retouchLevel] || settings.priceStandard);
          o.totalAmount = (o.deposit || 0) + (o.extraCost || 0) + (o.depositAmount || 0);
        });
        await refreshDashboard();
      };

      // ==================== 业务操作 ====================
      window.markWechat = async (id) => { const o = allOrders.find(x => x.id === id); if (o) { o.wechatAdded = true; await dbPut('orders', o); refreshDashboard(); } };
      window.openDeposit = (id) => {
        document.getElementById('depositModal').innerHTML = `
        <div class="modal-box text-sm" onclick="event.stopPropagation()">
          <h3 class="font-bold text-lg mb-3">⚠️ 押金登记</h3>
          <input type="hidden" id="depId" value="${id}">
          <label class="block mb-1">金额</label><input type="number" id="depAmt" class="w-full px-3 py-2 border rounded-lg mb-3">
          <div class="flex gap-2 justify-end"><button onclick="document.getElementById('depositModal').classList.add('hidden')" class="btn-action">取消</button><button onclick="confirmDeposit()" class="btn-action btn-copper font-bold">确认</button></div>
        </div>`;
        document.getElementById('depositModal').classList.remove('hidden');
      };
      window.confirmDeposit = async () => {
        const id = document.getElementById('depId').value;
        const amt = parseFloat(document.getElementById('depAmt').value) || 0;
        const o = allOrders.find(x => x.id === id);
        if (o) { o.rentalDepositPaid = true; o.depositAmount = amt; o.totalAmount += amt; await dbPut('orders', o); }
        document.getElementById('depositModal').classList.add('hidden');
        refreshDashboard();
      };
      window.returnRental = async (id) => { const o = allOrders.find(x => x.id === id); if (o) { o.rentalReturned = true; await dbPut('orders', o); refreshDashboard(); } };
      window.setRetouch = async (id, level) => { const o = allOrders.find(x => x.id === id); if (o) { o.retouchLevel = level; updateSetting('priceStandard', settings.priceStandard); } };
      window.changeExtra = async (id, delta) => { const o = allOrders.find(x => x.id === id); if (o) { o.extraPhotos = Math.max(0, (o.extraPhotos||0) + delta); updateSetting('priceStandard', settings.priceStandard); } };
      window.skipToDelivery = async (id) => { const o = allOrders.find(x => x.id === id); if (o && o.type === 'makeup_only') { o.currentTrack = 'track6'; o.timestamp = Date.now(); o.makeupArtistId = null; await dbPut('orders', o); refreshDashboard(); } };

      // ==================== 运力增删 ====================
      window.addStaff = async (r) => {
        const name = prompt('姓名：');
        if (!name) return;
        const s = { id: 'staff_'+Date.now(), name, role: r, status: 'idle', currentLoad: 0 };
        await dbPut('staff', s);
        refreshDashboard();
      };
      window.removeStaff = async (id) => {
        const s = allStaff.find(x => x.id === id);
        if (!s) return;
        if (s.currentLoad > 0) return alert('正在服务中，无法删除');
        if (confirm(`移除 ${s.name}？`)) { await dbDelete('staff', id); refreshDashboard(); }
      };

      // ==================== 拖拽 ====================
      window.handleDragOver = (e, trackId, key) => { e.preventDefault(); const col = document.getElementById('track-col-'+trackId); if (col) col.classList.add('drag-over'); };
      window.handleDragLeave = (e, trackId) => { document.getElementById('track-col-'+trackId)?.classList.remove('drag-over'); };
      window.handleDrop = async (e, trackId, key) => {
        e.preventDefault();
        document.getElementById('track-col-'+trackId)?.classList.remove('drag-over');
        const id = draggingId || e.dataTransfer.getData('text/plain');
        const o = allOrders.find(x => x.id === id);
        if (!o) return;
        if (key === 'styling' && o.type === 'photo_only') return alert('纯摄影无需妆造');
        if (key === 'shooting' && o.type === 'makeup_only') return alert('纯妆造无需拍摄');
        if (key === 'selection' && o.type === 'rental' && !o.rentalDepositPaid) { alert('请先登记押金'); return openDeposit(o.id); }
        o.currentTrack = trackId;
        o.timestamp = Date.now();
        if (key === 'styling' && !o.makeupArtistId && o.type !== 'photo_only') { const idle = allStaff.find(s => s.role==='makeup' && s.status==='idle'); o.makeupArtistId = idle?.id || null; }
        if (key === 'shooting' && !o.photographerId && o.type !== 'makeup_only') { const idle = allStaff.find(s => s.role==='photo' && s.status==='idle'); o.photographerId = idle?.id || null; }
        if (o.currentTrack !== 'track3') o.makeupArtistId = null;
        if (o.currentTrack !== 'track4') o.photographerId = null;
        await dbPut('orders', o);
        refreshDashboard();
      };

      // ==================== 弹窗 ====================
      window.openChannelManager = () => {
        const today = new Date().toISOString().split('T')[0];
        const orders = allOrders.filter(o => o.date === today);
        const stats = {};
        orders.forEach(o => { const ch = o.channel || '散客'; if (!stats[ch]) stats[ch] = { count: 0, total: 0 }; stats[ch].count++; stats[ch].total += (o.deposit||0)+(o.extraCost||0)+(o.depositAmount||0); });
        let rows = '', totalC = 0, totalA = 0;
        for (const [ch, d] of Object.entries(stats)) { totalC += d.count; totalA += d.total; rows += `<tr class="border-b"><td class="p-2">${ch}</td><td class="p-2 text-right">${d.count}单</td><td class="p-2 text-right">¥${d.total.toLocaleString()}</td></tr>`; }
        document.getElementById('channelModal').innerHTML = `
        <div class="modal-box" style="max-width:700px;"><div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold">📋 渠道对账</h2><button onclick="document.getElementById('channelModal').classList.add('hidden')" class="text-gray-400 text-2xl">&times;</button></div>
        <div class="overflow-auto max-h-96"><table class="w-full text-xs"><thead><tr class="bg-gray-100"><th class="p-2 text-left">渠道</th><th class="p-2 text-right">订单数</th><th class="p-2 text-right">总金额</th></tr></thead><tbody>${rows||'<tr><td colspan="3" class="p-4 text-center text-gray-400">暂无数据</td></tr>'}</tbody><tfoot class="font-bold border-t-2"><tr><td class="p-2">📌合计</td><td class="p-2 text-right">${totalC}单</td><td class="p-2 text-right">¥${totalA.toLocaleString()}</td></tr></tfoot></table></div>
        <button onclick="document.getElementById('channelModal').classList.add('hidden')" class="mt-4 w-full py-2 rounded-lg text-white font-bold" style="background:var(--green);">关闭</button></div>`;
        document.getElementById('channelModal').classList.remove('hidden');
      };
      window.openCallPartTimer = () => {
        document.getElementById('callPartTimerModal').innerHTML = `
        <div class="modal-box"><h2 class="text-lg font-bold mb-4">📣 一键呼叫外部兼职</h2>
        <div class="space-y-3 text-sm"><div><label class="font-semibold">基础工费</label><input id="basePay" value="200" class="w-full px-3 py-2 border rounded-lg"></div>
        <div><label class="font-semibold">风格</label><select id="style" class="w-full px-3 py-2 border rounded-lg"><optgroup label="化妆"><option>傣族重工</option><option>敦煌飞天</option><option>苗族银饰</option><option>大唐古风</option></optgroup><optgroup label="摄影"><option>暮光夜景</option><option>日系复古</option><option>新中式国潮</option></optgroup></select></div>
        <div class="flex items-center gap-2"><input type="checkbox" id="commToggle" checked> <label>二消提成</label></div>
        <div><label class="font-semibold">店员提成%</label><input id="commPer" value="20" class="w-full px-3 py-2 border rounded-lg"></div></div>
        <button onclick="alert('已发布');document.getElementById('callPartTimerModal').classList.add('hidden')" class="mt-4 w-full py-2 rounded-lg text-white font-bold" style="background:var(--copper);">确认发布</button></div>`;
        document.getElementById('callPartTimerModal').classList.remove('hidden');
      };
      window.printOrder = (id) => {
        const o = allOrders.find(x => x.id === id); if (!o) return;
        const level = { standard: '标准精修', premium: '超精修', commercial: '商业精修' };
        document.getElementById('printArea').innerHTML = `
        <div style="font-family:'PingFang SC','Microsoft YaHei',sans-serif;"><h3 style="text-align:center;border-bottom:2px solid #000;padding-bottom:6px;">旅拍档期派 · 双联单据</h3>
        <table class="print-table"><tr><td><b>流水号</b></td><td>${o.flowNumber}</td><td><b>渠道</b></td><td>${o.channel||'散客'}</td></tr>
        <tr><td><b>客户</b></td><td>${o.name}</td><td><b>电话</b></td><td>${o.phone||'—'}</td></tr>
        <tr><td><b>精修</b></td><td>${level[o.retouchLevel]}</td><td><b>加选</b></td><td>${o.extraPhotos}张</td></tr>
        <tr><td><b>加选费</b></td><td>¥${o.extraCost}</td><td><b>押金</b></td><td>¥${o.depositAmount||0}</td></tr>
        <tr><td><b>总金额</b></td><td style="font-weight:bold;">¥${o.totalAmount}</td><td><b>状态</b></td><td>${o.currentTrack==='track6'?'✅已结算':'🔄进行中'}</td></tr></table>
        <div style="margin-top:12px;display:flex;justify-content:space-between;"><span>选片师：<span style="display:inline-block;width:100px;border-bottom:1px solid #000;"></span></span><span>客户：<span style="display:inline-block;width:100px;border-bottom:1px solid #000;"></span></span></div></div>`;
        document.getElementById('printArea').style.display = 'block';
        setTimeout(() => { window.print(); setTimeout(() => document.getElementById('printArea').style.display = 'none', 500); }, 200);
      };

      // ==================== 启动 ====================
      (async () => {
        await openDB();
        await loadInitialData();
        const saved = sessionStorage.getItem('role');
        if (saved === 'boss' || saved === 'staff') { role = saved; document.getElementById('authOverlay').classList.add('hidden'); applyRole(); }
        document.getElementById('quickInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleQuickInput(); });
        refreshDashboard();
      })();
    })();
  </script>
</body>
</html>
