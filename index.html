<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅拍档期派 · 商家控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F8F9FA; font-family: system-ui, -apple-system, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            body * { display: none !important; }
            #print-area, #print-area * { display: block !important; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-700 flex flex-col">

    <div id="global-login-overlay" class="fixed inset-0 z-[99999] flex items-center justify-center bg-white/80 backdrop-blur-2xl transition-all duration-500">
        <div class="w-full max-w-md p-8 bg-white/90 rounded-3xl border border-slate-200/60 shadow-2xl shadow-slate-200/50 text-center">
            <div class="w-16 h-16 bg-[#00C853] text-white rounded-2xl flex items-center justify-center text-2xl font-bold mx-auto mb-6 shadow-lg shadow-green-200/50">派</div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">旅拍档期派 · 商家控制台</h2>
            <p class="text-sm text-slate-400 mt-2 mb-8">请使用授权密码验证登录</p>
            <div class="space-y-4">
                <input type="password" id="login-password-input" placeholder="输入访问密码 (员工/老板)" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-center text-lg tracking-widest focus:outline-none focus:border-[#00C853] focus:bg-white transition-all">
                <div id="login-error-msg" class="text-xs text-rose-500 font-medium h-4 opacity-0 transition-opacity">密码错误，请重新输入</div>
                <button onclick="handleSystemLogin()" class="w-full py-4 bg-[#00C853] hover:bg-[#00A944] text-white font-semibold rounded-2xl shadow-lg shadow-green-200 transition-all">验证并进入系统</button>
            </div>
        </div>
    </div>

    <header class="h-16 border-b border-slate-200/60 bg-white/80 backdrop-blur-md flex items-center justify-between px-6 z-40 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-[#00C853] rounded-lg flex items-center justify-center text-white font-bold text-sm">派</div>
            <div>
                <h1 class="text-base font-bold text-slate-800 tracking-tight">旅拍档期派 · 商家控制台</h1>
                <p class="text-[10px] text-slate-400 tracking-wider uppercase">Live Scheduling Dashboard</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-6">
            <div class="text-center">
                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">今日实时营业额</p>
                <p id="today-revenue-display" class="text-xl font-bold text-[#00C853] tracking-tight">¥ 0</p>
            </div>
            
            <button onclick="openCallModal()" class="px-4 py-2 border-2 border-[#FFE100] text-slate-800 font-semibold rounded-xl hover:bg-[#FFE100]/10 transition-all text-sm text-center">
                一键呼叫外部兼职
            </button>
            <button onclick="openChannelModal()" id="channel-btn" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-xl transition-all text-sm">
                渠道对账
            </button>
            <button onclick="systemLogout()" class="text-slate-400 hover:text-rose-500 text-sm transition-all">
                退出
            </button>
        </div>

        <div class="w-80 relative">
            <input type="text" id="quick-input-bar" placeholder="盲打录入: 姓名 电话 定金 渠道" class="w-full px-4 py-2 bg-slate-50 border border-slate-200/80 rounded-xl text-sm focus:outline-none focus:border-[#00C853] focus:bg-white transition-all">
            <button onclick="triggerQuickInput()" class="absolute right-1.5 top-1.5 w-6 h-6 bg-[#00C853] text-white rounded-lg flex items-center justify-center text-xs hover:bg-[#00A944] transition-all">↵</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-60 border-r border-slate-200/60 bg-white p-4 flex flex-col space-y-6 overflow-y-auto no-scrollbar shrink-0">
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">化妆师运力</h3>
                <div id="makeup-pool" class="space-y-2"></div>
                <button onclick="addStaff('makeup')" class="w-full mt-2 py-2 border border-dashed border-slate-200 rounded-xl text-xs text-slate-400 hover:text-[#00C853] hover:border-[#00C853] transition-all">+ 添加化妆师</button>
            </div>
            <hr class="border-slate-100">
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">摄影师运力</h3>
                <div id="photographer-pool" class="space-y-2"></div>
                <button onclick="addStaff('photo')" class="w-full mt-2 py-2 border border-dashed border-slate-200 rounded-xl text-xs text-slate-400 hover:text-[#00C853] hover:border-[#00C853] transition-all">+ 添加摄影师</button>
            </div>
        </aside>

        <section id="board-container" class="flex-1 grid grid-cols-6 p-4 gap-4 overflow-x-auto bg-[#F8F9FA]">
            <div class="flex flex-col bg-slate-100/50 rounded-2xl border border-slate-200/40 p-3 h-full overflow-hidden">
                <div class="flex items-center justify-between mb-3 shrink-0 px-1">
                    <div class="flex items-center space-x-1.5"><span class="w-2 h-2 rounded-full bg-[#00C853]"></span><span class="text-xs font-bold text-slate-700">预约到店</span></div>
                    <span id="count-appointment" class="px-2 py-0.5 bg-slate-200/60 rounded-full text-[10px] font-bold text-slate-600">0</span>
                </div>
                <div id="track-appointment" ondragover="allowDrop(event)" ondrop="dropCard(event, 'appointment')" class="flex-1 space-y-3 overflow-y-auto no-scrollbar pb-12"></div>
            </div>
            <div class="flex flex-col bg-slate-100/50 rounded-2xl border border-slate-200/40 p-3 h-full overflow-hidden">
                <div class="flex items-center justify-between mb-3 shrink-0 px-1">
                    <div class="flex items-center space-x-1.5"><span class="w-2 h-2 rounded-full bg-[#00C853]"></span><span class="text-xs font-bold text-slate-700">选衣确认</span></div>
                    <span id="count-cloth" class="px-2 py-0.5 bg-slate-200/60 rounded-full text-[10px] font-bold text-slate-600">0</span>
                </div>
                <div id="track-cloth" ondragover="allowDrop(event)" ondrop="dropCard(event, 'cloth')" class="flex-1 space-y-3 overflow-y-auto no-scrollbar pb-12"></div>
            </div>
            <div class="flex flex-col bg-slate-100/50 rounded-2xl border border-slate-200/40 p-3 h-full overflow-hidden">
                <div class="flex items-center justify-between mb-3 shrink-0 px-1">
                    <div class="flex items-center space-x-1.5"><span class="w-2 h-2 rounded-full bg-[#00C853]"></span><span class="text-xs font-bold text-slate-700">妆造中</span></div>
                    <span id="count-styling" class="px-2 py-0.5 bg-slate-200/60 rounded-full text-[10px] font-bold text-slate-600">0</span>
                </div>
                <div id="track-styling" ondragover="allowDrop(event)" ondrop="dropCard(event, 'styling')" class="flex-1 space-y-3 overflow-y-auto no-scrollbar pb-12"></div>
            </div>
            <div class="flex flex-col bg-slate-100/50 rounded-2xl border border-slate-200/40 p-3 h-full overflow-hidden">
                <div class="flex items-center justify-between mb-3 shrink-0 px-1">
                    <div class="flex items-center space-x-1.5"><span class="w-2 h-2 rounded-full bg-[#00C853]"></span><span class="text-xs font-bold text-slate-700">指派摄影</span></div>
                    <span id="count-shooting" class="px-2 py-0.5 bg-slate-200/60 rounded-full text-[10px] font-bold text-slate-600">0</span>
                </div>
                <div id="track-shooting" ondragover="allowDrop(event)" ondrop="dropCard(event, 'shooting')" class="flex-1 space-y-3 overflow-y-auto no-scrollbar pb-12"></div>
            </div>
            <div class="flex flex-col bg-slate-100/50 rounded-2xl border border-slate-200/40 p-3 h-full overflow-hidden">
                <div class="flex items-center justify-between mb-2 shrink-0 px-1">
                    <div class="flex items-center space-x-1.5"><span class="w-2 h-2 rounded-full bg-[#00C853]"></span><span class="text-xs font-bold text-slate-700">选片区</span></div>
                    <span id="count-selection" class="px-2 py-0.5 bg-slate-200/60 rounded-full text-[10px] font-bold text-slate-600">0</span>
                </div>
                <div id="staff-only-prices" class="bg-white border border-slate-200/60 rounded-xl p-2 mb-3 space-y-1.5 shrink-0 text-[11px]">
                    <select id="config-select-mode" onchange="saveSelectionConfig()" class="w-full bg-slate-50 border border-slate-200 rounded p-1 font-medium focus:outline-none">
                        <option value="shop">店内选片模式 (排队+计价)</option>
                        <option value="away">离店自选模式 (加微信放行)</option>
                    </select>
                    <div class="grid grid-cols-3 gap-1">
                        <div>标准 <input type="number" id="price-std" value="40" onchange="saveSelectionConfig()" class="w-full border border-slate-200 rounded text-center p-0.5"></div>
                        <div>超精 <input type="number" id="price-sup" value="60" onchange="saveSelectionConfig()" class="w-full border border-slate-200 rounded text-center p-0.5"></div>
                        <div>商业 <input type="number" id="price-com" value="100" onchange="saveSelectionConfig()" class="w-full border border-slate-200 rounded text-center p-0.5"></div>
                    </div>
                </div>
                <div id="track-selection" ondragover="allowDrop(event)" ondrop="dropCard(event, 'selection')" class="flex-1 space-y-3 overflow-y-auto no-scrollbar pb-12"></div>
            </div>
            <div class="flex flex-col bg-slate-100/50 rounded-2xl border border-slate-200/40 p-3 h-full overflow-hidden">
                <div class="flex items-center justify-between mb-3 shrink-0 px-1">
                    <div class="flex items-center space-x-1.5"><span class="w-2 h-2 rounded-full bg-[#00C853]"></span><span class="text-xs font-bold text-slate-700">精修交付</span></div>
                    <span id="count-delivery" class="px-2 py-0.5 bg-slate-200/60 rounded-full text-[10px] font-bold text-slate-600">0</span>
                </div>
                <div id="track-delivery" ondragover="allowDrop(event)" ondrop="dropCard(event, 'delivery')" class="flex-1 space-y-3 overflow-y-auto no-scrollbar pb-12"></div>
            </div>
        </section>
    </main>

    <div id="modal-call" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white w-full max-w-md p-6 rounded-3xl border border-slate-200 shadow-2xl relative">
            <button onclick="closeCallModal()" class="absolute right-4 top-4 text-slate-400 hover:text-slate-600 text-xl">✕</button>
            <h3 class="text-lg font-bold text-slate-800 mb-6">一键呼叫外部兼职</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">基础工费 (¥)</label>
                    <input type="number" id="call-price" value="60" class="w-full mt-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-[#00C853]">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">工种风格 (全国内行扩容)</label>
                    <select id="call-style" class="w-full mt-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-[#00C853]">
                        <optgroup label="💄 化妆造型">
                            <option value="化妆: 傣族重工">傣族重工妆造</option>
                            <option value="化妆: 敦煌飞天">敦煌飞天妆造</option>
                            <option value="化妆: 苗族银饰">苗族银饰妆造</option>
                            <option value="化妆: 大唐古风">大唐古风妆造</option>
                            <option value="化妆: 西域公主">西域公主妆造</option>
                            <option value="化妆: 战国袍">战国袍妆造</option>
                        </optgroup>
                        <optgroup label="📷 拍摄风格">
                            <option value="摄影: 暮光夜景">暮光夜景拍摄</option>
                            <option value="摄影: 日系复古">日系复古拍摄</option>
                            <option value="摄影: 新中式国潮">新中式国潮拍摄</option>
                            <option value="摄影: 浪漫法式">浪漫法式拍摄</option>
                            <option value="摄影: 纪实情绪">纪实情绪旅拍</option>
                        </optgroup>
                    </select>
                </div>
                <div class="flex items-center justify-between pt-2">
                    <span class="text-sm font-medium text-slate-600">包含美瞳/睫毛等二消提成机制</span>
                    <input type="checkbox" id="call-has-bonus" class="w-5 h-5 accent-[#00C853]">
                </div>
                <div class="flex space-x-3 pt-4">
                    <button onclick="closeCallModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all">取消</button>
                    <button onclick="submitCall()" class="flex-1 py-3 bg-[#00C853] hover:bg-[#00A944] text-white font-semibold rounded-xl shadow-lg shadow-green-200 transition-all">确认发布</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-channel" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-lg p-6 rounded-3xl border border-slate-200 shadow-2xl relative">
            <button onclick="closeChannelModal()" class="absolute right-4 top-4 text-slate-400 hover:text-slate-600 text-xl">✕</button>
            <h3 class="text-lg font-bold text-slate-800 mb-2">今日渠道客源对账汇总表</h3>
            <p class="text-xs text-slate-400 mb-4">系统自动捕获盲打录入之新渠道，每日关店核对无误后打勾结算。</p>
            <div class="max-h-60 overflow-y-auto border border-slate-100 rounded-xl">
                <table class="w-full text-left text-sm text-slate-600">
                    <thead class="bg-slate-50 text-xs font-bold text-slate-400 uppercase">
                        <tr>
                            <th class="p-3">客源渠道</th>
                            <th class="p-3">单数</th>
                            <th class="p-3">产生营业额</th>
                            <th class="p-3 text-center">状态</th>
                        </tr>
                    </thead>
                    <tbody id="channel-summary-table"></tbody>
                </table>
            </div>
            <button onclick="closeChannelModal()" class="w-full mt-5 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all">关闭对账单</button>
        </div>
    </div>

    <div id="print-area" class="hidden p-8 bg-white text-black w-[210mm]"></div>

    <script>
        // 核心底数：IndexedDB 配置与硬编码密码
        const STAFF_PWD = "staff888";
        const BOSS_PWD = "boss999";
        let db = null;

        // 1. 初始化本地持久化数据库
        function initIndexedDB() {
            const request = indexedDB.open("TripShotPlatformDB", 2);
            request.onerror = (e) => console.error("Database open error", e);
            request.onsuccess = (e) => {
                db = e.target.result;
                loadSelectionConfig();
                initStaffPool();
                refreshDashboard();
            };
            request.onupgradeneeded = (e) => {
                let database = e.target.result;
                if (!database.objectStoreNames.contains("customers")) {
                    database.createObjectStore("customers", { keyPath: "id", autoIncrement: true });
                }
                if (!database.objectStoreNames.contains("staff")) {
                    database.createObjectStore("staff", { keyPath: "id" });
                }
            };
        }

        // 2. 权限校验模块 (sessionStorage)
        function checkSystemAuth() {
            const role = sessionStorage.getItem('app_auth_role');
            const overlay = document.getElementById('global-login-overlay');
            const revDisplay = document.getElementById('today-revenue-display');
            const chanBtn = document.getElementById('channel-btn');
            const pricesConfig = document.getElementById('staff-only-prices');

            if (!overlay) return;
            if (role === 'boss' || role === 'staff') {
                overlay.classList.add('pointer-events-none', 'opacity-0');
                if (role === 'staff') {
                    if (revDisplay) revDisplay.textContent = "¥ ***";
                    if (chanBtn) chanBtn.classList.add('pointer-events-none', 'opacity-40');
                    if (pricesConfig) pricesConfig.classList.add('pointer-events-none', 'opacity-40');
                }
            } else {
                overlay.classList.remove('pointer-events-none', 'opacity-0');
                document.getElementById('login-password-input').focus();
            }
        }

        function handleSystemLogin() {
            const pwdInput = document.getElementById('login-password-input');
            const errorMsg = document.getElementById('login-error-msg');
            const pwd = pwdInput.value.trim();

            if (pwd === BOSS_PWD) {
                sessionStorage.setItem('app_auth_role', 'boss');
                window.location.reload();
            } else if (pwd === STAFF_PWD) {
                sessionStorage.setItem('app_auth_role', 'staff');
                window.location.reload();
            } else {
                errorMsg.style.opacity = '1';
                pwdInput.classList.add('border-rose-400', 'bg-rose-50');
                setTimeout(() => pwdInput.classList.remove('border-rose-400', 'bg-rose-50'), 1000);
            }
        }

        function systemLogout() {
            sessionStorage.removeItem('app_auth_role');
            window.location.reload();
        }

        // 3. 顶部盲打录入引擎 (条件降级拆分算法)
        document.getElementById('quick-input-bar').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') triggerQuickInput();
        });

        function triggerQuickInput() {
            const inputEl = document.getElementById('quick-input-bar');
            const rawText = inputEl.value.trim();
            if (!rawText) return;

            const tokens = rawText.split(/\s+/);
            let name = "匿名散客";
            let phone = "无";
            let deposit = 0;
            let channel = "自由进店";

            // 解析算法过滤
            if (tokens.length > 0) {
                // 先尝试提走并吸收最后一个非数字作为渠道
                const lastToken = tokens[tokens.length - 1];
                if (isNaN(lastToken) && !/^1[3-9]\d{9}$/.test(lastToken) && tokens.length > 1) {
                    channel = tokens.pop();
                }

                // 剩余段落提取
                if (tokens.length > 0) {
                    name = tokens[0];
                    for (let i = 1; i < tokens.length; i++) {
                        if (/^1[3-9]\d{9}$/.test(tokens[i])) {
                            phone = tokens[i];
                        } else if (!isNaN(tokens[i])) {
                            deposit = parseFloat(tokens[i]) || 0;
                        }
                    }
                }
            }

            const newCustomer = {
                name: name,
                phone: phone,
                deposit: deposit,
                channel: channel,
                balancePaid: false,
                makeupArtist: "",
                photographer: "",
                shootType: "标准精修",
                extraCharges: 0,
                extraCount: 0,
                wechatAdded: false,
                status: "appointment",
                timestamp: Date.now(),
                remark: ""
            };

            const tx = db.transaction("customers", "readwrite");
            tx.objectStore("customers").add(newCustomer);
            tx.oncomplete = () => {
                inputEl.value = "";
                refreshDashboard();
            };
        }

        // 4. 仪表盘动态渲染引擎与运力负载防错
        function refreshDashboard() {
            if (!db) return;
            const tracks = { appointment: [], cloth: [], styling: [], shooting: [], selection: [], delivery: [] };
            let totalRevenue = 0;
            let staffCounts = {};

            const tx = db.transaction("customers", "readonly");
            const store = tx.objectStore("customers");
            
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    if (tracks[item.status]) tracks[item.status].push(item);
                    
                    // 计算基础流流水与加选总营业额
                    totalRevenue += (item.deposit || 0) + (item.extraCharges || 0);

                    // 统计运力池负荷
                    if (item.status === 'styling' && item.makeupArtist) {
                        staffCounts[item.makeupArtist] = (staffCounts[item.makeupArtist] || 0) + 1;
                    }
                    if (item.status === 'shooting' && item.photographer) {
                        staffCounts[item.photographer] = (staffCounts[item.photographer] || 0) + 1;
                    }
                    cursor.continue();
                } else {
                    // 全量清理并重构流转卡片DOM
                    renderTrackDOM('appointment', tracks.appointment, staffCounts);
                    renderTrackDOM('cloth', tracks.cloth, staffCounts);
                    renderTrackDOM('styling', tracks.styling, staffCounts);
                    renderTrackDOM('shooting', tracks.shooting, staffCounts);
                    
                    // 核心选片轨道应用时间戳排序法则
                    tracks.selection.sort((a, b) => b.timestamp - a.timestamp);
                    renderTrackDOM('selection', tracks.selection, staffCounts);
                    
                    renderTrackDOM('delivery', tracks.delivery, staffCounts);

                    // 更新顶部营业额组件 (若非员工)
                    if (sessionStorage.getItem('app_auth_role') !== 'staff') {
                        document.getElementById('today-revenue-display').textContent = `¥ ${totalRevenue.toLocaleString()}`;
                    }
                    updateStaffUI(staffCounts);
                }
            };
        }

        function renderTrackDOM(trackId, items, staffCounts) {
            const container = document.getElementById(`track-${trackId}`);
            document.getElementById(`count-${trackId}`).textContent = items.length;
            container.innerHTML = "";

            items.forEach(item => {
                const card = document.createElement("div");
                card.className = `p-4 bg-white border rounded-2xl shadow-sm border-slate-200/80 cursor-grab active:cursor-grabbing relative transition-all duration-300`;
                card.draggable = true;
                card.id = `customer-${item.id}`;
                card.ondragstart = (e) => e.dataTransfer.setData("text/plain", item.id);

                // 根据业务类型进行分流高亮
                let typeBadge = `<span class="px-1.5 py-0.5 bg-purple-50 text-purple-600 rounded text-[10px] font-bold">${item.channel}</span>`;
                
                // 负载超载闪烁卡卡点
                let isOverloaded = false;
                if (trackId === 'styling' && staffCounts[item.makeupArtist] >= 2) isOverloaded = true;
                if (trackId === 'shooting' && staffCounts[item.photographer] >= 2) isOverloaded = true;
                if (isOverloaded) card.classList.add('border-[#FFE100]', 'animate-pulse', 'bg-yellow-50/20');

                // 选片轨道定制计价器和微信卡点
                let selectSectionUI = "";
                if (trackId === 'selection') {
                    const mode = localStorage.getItem('select_mode') || 'shop';
                    if (mode === 'away') {
                        selectSectionUI = `
                            <div class="mt-3 flex items-center justify-between border-t pt-2 border-slate-100">
                                <button onclick="toggleWechat(${item.id}, ${item.wechatAdded})" class="text-xs font-semibold ${item.wechatAdded ? 'text-[#00C853]' : 'text-slate-400 line-through'}">
                                    ${item.wechatAdded ? '🟢 微信已加' : '⚪ 未加微信'}
                                </button>
                                <button onclick="directRelease(${item.id})" class="px-2 py-1 bg-[#00C853] text-white text-[11px] rounded-lg font-medium">离店归档</button>
                            </div>`;
                    } else {
                        const stdPrice = parseFloat(localStorage.getItem('p_std')) || 40;
                        selectSectionUI = `
                            <div class="mt-3 border-t pt-2 border-slate-100 text-[11px] text-slate-500 space-y-1">
                                <div class="flex justify-between items-center">
                                    <select onchange="updateShootType(${item.id}, this.value)" class="bg-slate-50 border rounded p-0.5">
                                        <option value="标准精修" ${item.shootType==='标准精修'?'selected':''}>标准精修</option>
                                        <option value="超精修" ${item.shootType==='超精修'?'selected':''}>超精修</option>
                                        <option value="商业精修" ${item.shootType==='商业精修'?'selected':''}>商业精修</option>
                                    </select>
                                    <div class="flex items-center space-x-1">
                                        <button onclick="changeExtraCount(${item.id}, -1)" class="w-4 h-4 bg-slate-100 rounded flex items-center justify-center font-bold">-</button>
                                        <span class="font-bold text-slate-700">+${item.extraCount}张</span>
                                        <button onclick="changeExtraCount(${item.id}, 1)" class="w-4 h-4 bg-slate-100 rounded flex items-center justify-center font-bold">+</button>
                                    </div>
                                </div>
                                <div class="flex justify-between items-center text-slate-400 text-[10px]">
                                    <span>加选金额: <b class="text-slate-700">¥${item.extraCharges}</b></span>
                                    <button onclick="printA4Receipt(${item.id})" class="px-1.5 py-0.5 border rounded border-slate-200 text-slate-600 hover:bg-slate-50">🖨️ 打印单据</button>
                                </div>
                            </div>`;
                    }
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start text-xs mb-1">
                        <span class="font-bold text-slate-400">#${String(item.id).padStart(3, '0')}</span>
                        ${typeBadge}
                    </div>
                    <h4 class="font-bold text-sm text-slate-800">${item.name}</h4>
                    <p class="text-xs text-slate-400 mt-0.5">${item.phone} | 定金:¥${item.deposit}</p>
                    ${trackId==='styling'? `<div class="text-[10px] bg-slate-50 border rounded p-1 mt-2 text-slate-500">化妆师: <b>${item.makeupArtist || '未指派'}</b></div>`:''}
                    ${trackId==='shooting'? `<div class="text-[10px] bg-slate-50 border rounded p-1 mt-2 text-slate-500">摄影师: <b>${item.photographer || '未指派'}</b></div>`:''}
                    ${selectSectionUI}
                `;
                container.appendChild(card);
            });
        }

        // 5. 拖拽流转控制单元
        function allowDrop(e) { e.preventDefault(); }
        function dropCard(e, targetStatus) {
            e.preventDefault();
            const id = parseInt(e.dataTransfer.getData("text/plain"));
            if (!id) return;

            const tx = db.transaction("customers", "readwrite");
            const store = tx.objectStore("customers");
            
            store.get(id).onsuccess = (evt) => {
                const customer = evt.target.result;
                if (!customer) return;

                // 强制进行转运指派处理
                if (targetStatus === 'styling' && !customer.makeupArtist) {
                    const artist = prompt("请输入指派化妆师姓名:");
                    if (!artist) return;
                    customer.makeupArtist = artist;
                }
                if (targetStatus === 'shooting' && !customer.photographer) {
                    const photo = prompt("请输入指派摄影师姓名:");
                    if (!photo) return;
                    customer.photographer = photo;
                }

                customer.status = targetStatus;
                customer.timestamp = Date.now();
                store.put(customer);
                tx.oncomplete = () => refreshDashboard();
            };
        }

        // 6. 选片核心逻辑细节函数实现
        function saveSelectionConfig() {
            localStorage.setItem('select_mode', document.getElementById('config-select-mode').value);
            localStorage.setItem('p_std', document.getElementById('price-std').value);
            localStorage.setItem('p_sup', document.getElementById('price-sup').value);
            localStorage.setItem('p_com', document.getElementById('price-com').value);
            refreshDashboard();
        }

        function loadSelectionConfig() {
            document.getElementById('config-select-mode').value = localStorage.getItem('select_mode') || 'shop';
            document.getElementById('price-std').value = localStorage.getItem('p_std') || 40;
            document.getElementById('price-sup').value = localStorage.getItem('p_sup') || 60;
            document.getElementById('price-com').value = localStorage.getItem('p_com') || 100;
        }

        function updateShootType(id, val) {
            const tx = db.transaction("customers", "readwrite");
            const store = tx.objectStore("customers");
            store.get(id).onsuccess = (e) => {
                const item = e.target.result;
                item.shootType = val;
                // 重新绑定计算单价
                let unit = parseFloat(localStorage.getItem('p_std')) || 40;
                if (val === '超精修') unit = parseFloat(localStorage.getItem('p_sup')) || 60;
                if (val === '商业精修') unit = parseFloat(localStorage.getItem('p_com')) || 100;
                item.extraCharges = item.extraCount * unit;
                store.put(item);
                tx.oncomplete = () => refreshDashboard();
            };
        }

        function changeExtraCount(id, delta) {
            const tx = db.transaction("customers", "readwrite");
            const store = tx.objectStore("customers");
            store.get(id).onsuccess = (e) => {
                const item = e.target.result;
                item.extraCount = Math.max(0, item.extraCount + delta);
                let unit = parseFloat(localStorage.getItem('p_std')) || 40;
                if (item.shootType === '超精修') unit = parseFloat(localStorage.getItem('p_sup')) || 60;
                if (item.shootType === '商业精修') unit = parseFloat(localStorage.getItem('p_com')) || 100;
                item.extraCharges = item.extraCount * unit;
                store.put(item);
                tx.oncomplete = () => refreshDashboard();
            };
        }

        function toggleWechat(id, current) {
            const tx = db.transaction("customers", "readwrite");
            const store = tx.objectStore("customers");
            store.get(id).onsuccess = (e) => {
                const item = e.target.result;
                item.wechatAdded = !current;
                store.put(item);
                tx.oncomplete = () => refreshDashboard();
            };
        }

        function directRelease(id) {
            const tx = db.transaction("customers", "readwrite");
            const store = tx.objectStore("customers");
            store.get(id).onsuccess = (e) => {
                const item = e.target.result;
                item.status = 'delivery';
                store.put(item);
                tx.oncomplete = () => refreshDashboard();
            };
        }

        // 7. 零门槛 A4 纸双联网页原生打印驱动
        function printA4Receipt(id) {
            const tx = db.transaction("customers", "readonly");
            tx.objectStore("customers").get(id).onsuccess = (e) => {
                const item = e.target.result;
                if (!item) return;

                const printArea = document.getElementById('print-area');
                const template = `
                    <div style="border: 2px solid #000; padding: 20px; font-family: sans-serif; width:100%; box-sizing:border-box;">
                        <h2 style="text-align: center; margin-bottom: 5px; font-size:20px; font-weight:bold;">旅拍档期派 · 选片流转确认单</h2>
                        <p style="text-align:center; font-size:11px; margin:0 0 15px 0;">(客源对账及修图师核心依据)</p>
                        <table style="width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 15px;">
                            <tr>
                                <td style="border: 1px solid #000; padding: 8px;"><b>今日流水号:</b> #${String(item.id).padStart(3, '0')}</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>客户姓名:</b> ${item.name}</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>渠道:</b> ${item.channel}</td>
                            </tr>
                            <tr>
                                <td style="border: 1px solid #000; padding: 8px;"><b>精修标准:</b> ${item.shootType}</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>加选张数:</b> +${item.extraCount} 张</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>加选金额:</b> ¥${item.extraCharges}</td>
                            </tr>
                            <tr>
                                <td colspan="3" style="border: 1px solid #000; padding: 8px; height:60px; vertical-align:top;">
                                    <b>精修数码特殊备注要求:</b> ${item.remark || '无特殊要求。'}
                                </td>
                            </tr>
                        </table>
                        <div style="display:flex; justify-content: space-between; margin-top:30px; font-size:13px;">
                            <span>选片师手写签名: ___________________</span>
                            <span>客户确认无误手写签字: ___________________</span>
                        </div>
                    </div>
                    <div style="border-top: 1px dashed #000; margin: 40px 0; text-align:center; font-size:11px; color:#666;">✂️ 上下双联裁剪线 (上联交修图师 / 下联门店财务备查) ✂️</div>
                    <div style="border: 2px solid #000; padding: 20px; font-family: sans-serif; width:100%; box-sizing:border-box;">
                        <h2 style="text-align: center; margin-bottom: 5px; font-size:20px; font-weight:bold;">旅拍档期派 · 选片流转确认单 (财务留底)</h2>
                        <table style="width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 15px;">
                            <tr>
                                <td style="border: 1px solid #000; padding: 8px;"><b>今日流水号:</b> #${String(item.id).padStart(3, '0')}</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>客户姓名:</b> ${item.name}</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>渠道:</b> ${item.channel}</td>
                            </tr>
                            <tr>
                                <td style="border: 1px solid #000; padding: 8px;"><b>精修标准:</b> ${item.shootType}</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>加选张数:</b> +${item.extraCount} 张</td>
                                <td style="border: 1px solid #000; padding: 8px;"><b>加选金额:</b> ¥${item.extraCharges}</td>
                            </tr>
                        </table>
                        <div style="display:flex; justify-content: space-between; margin-top:30px; font-size:13px;">
                            <span>选片师手写签名: ___________________</span>
                            <span>客户确认无误手写签字: ___________________</span>
                        </div>
                    </div>
                `;
                printArea.innerHTML = template;
                window.print();
            };
        }

        // 8. 模态框开关控制大单元 (全闭环)
        function openCallModal() { document.getElementById('modal-call').classList.remove('hidden'); }
        function closeCallModal() { document.getElementById('modal-call').classList.add('hidden'); }
        function submitCall() {
            alert(`⚡ 呼叫已打包发往档期派云端兼职池！\n风格: ${document.getElementById('call-style').value}\n工费: ¥${document.getElementById('call-price').value}/客`);
            closeCallModal();
        }

        function openChannelModal() {
            const tbody = document.getElementById('channel-summary-table');
            tbody.innerHTML = "";
            let summary = {};

            const tx = db.transaction("customers", "readonly");
            tx.objectStore("customers").openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    const ch = item.channel || "自由进店";
                    if (!summary[ch]) summary[ch] = { count: 0, revenue: 0 };
                    summary[ch].count++;
                    summary[ch].revenue += (item.deposit || 0) + (item.extraCharges || 0);
                    cursor.continue();
                } else {
                    // 渲染实时表格对账
                    for (let channelName in summary) {
                        const row = document.createElement('tr');
                        row.className = "border-b border-slate-100 hover:bg-slate-50/80 transition-all";
                        row.innerHTML = `
                            <td class="p-3 font-semibold text-slate-800">${channelName}</td>
                            <td class="p-3 text-slate-500">${summary[channelName].count} 单</td>
                            <td class="p-3 font-bold text-[#00C853]">¥${summary[channelName].revenue}</td>
                            <td class="p-3 text-center"><input type="checkbox" class="w-4 h-4 accent-[#00C853]"></td>
                        `;
                        tbody.appendChild(row);
                    }
                    if (Object.keys(summary).length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400 text-xs">今日暂无客源渠道对账流水数据</td></tr>`;
                    }
                    document.getElementById('modal-channel').classList.remove('hidden');
                }
            };
        }
        function closeChannelModal() { document.getElementById('modal-channel').classList.add('hidden'); }

        // 9. 人员运力池管理机制
        function initStaffPool() {
            const tx = db.transaction("staff", "readonly");
            const store = tx.objectStore("staff");
            store.getAll().onsuccess = (e) => {
                const list = e.target.result;
                if (list.length === 0) {
                    // 内置基础体验种子人员
                    const seeds = [
                        { id: "m1", name: "化妆师·琳达", type: "makeup" },
                        { id: "m2", name: "化妆师·小雅", type: "makeup" },
                        { id: "m3", name: "化妆师·艾米", type: "makeup" },
                        { id: "p1", name: "摄影师·阿杰", type: "photo" },
                        { id: "p2", name: "摄影师·浩然", type: "photo" },
                        { id: "p3", name: "摄影师·子轩", type: "photo" }
                    ];
                    const wtx = db.transaction("staff", "readwrite");
                    seeds.forEach(s => wtx.objectStore("staff").put(s));
                    wtx.oncomplete = () => refreshDashboard();
                }
            };
        }

        function updateStaffUI(staffCounts) {
            const mPool = document.getElementById('makeup-pool');
            const pPool = document.getElementById('photographer-pool');
            mPool.innerHTML = ""; pPool.innerHTML = "";

            const tx = db.transaction("staff", "readonly");
            tx.objectStore("staff").getAll().onsuccess = (e) => {
                e.target.result.forEach(s => {
                    const count = staffCounts[s.name] || 0;
                    const el = document.createElement('div');
                    el.className = "p-2.5 bg-slate-50 border border-slate-200/60 rounded-xl flex items-center justify-between text-xs";
                    el.innerHTML = `
                        <div>
                            <p class="font-bold text-slate-800">${s.name}</p>
                            <p class="text-[10px] text-slate-400 mt-0.5">${count > 0 ? '🟡 忙碌中' : '🟢 空闲'}</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="font-bold text-slate-600">${count}单</span>
                            <button onclick="removeStaff('${s.id}', ${count})" class="text-slate-300 hover:text-rose-500 font-bold px-1 text-sm">✕</button>
                        </div>
                    `;
                    if (s.type === 'makeup') mPool.appendChild(el);
                    else pPool.appendChild(el);
                });
            };
        }

        function addStaff(type) {
            const name = prompt("请输入要上岗的人员姓名:");
            if (!name) return;
            const prefix = type === 'makeup' ? '化妆师·' : '摄影师·';
            const finalName = name.startsWith('化妆') || name.startsWith('摄影') ? name : prefix + name;
            
            const id = "st-" + Date.now();
            const tx = db.transaction("staff", "readwrite");
            tx.objectStore("staff").put({ id: id, name: finalName, type: type });
            tx.oncomplete = () => refreshDashboard();
        }

        function removeStaff(id, currentCount) {
            if (currentCount > 0) {
                alert("🔒 运力安全拦截：该技术人员当前正有流转中的客人，无法删除下班！");
                return;
            }
            const tx = db.transaction("staff", "readwrite");
            tx.objectStore("staff").delete(id);
            tx.oncomplete = () => refreshDashboard();
        }

        // 10. 首屏自启与拦截审查
        window.addEventListener('DOMContentLoaded', () => {
            checkSystemAuth();
            initIndexedDB();
        });
    </script>
