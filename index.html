<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>旅拍档期派 · 商家控制台</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root {
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --border: #E2E8F0;
            --green: #00C853;
            --yellow: #FFE100;
            --copper: #D84315;
            --text: #1a1a2e;
            --text-secondary: #5a6a7e;
            --glass: rgba(255, 255, 255, 0.78);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.05);
            --shadow-glow-green: 0 0 20px rgba(0, 200, 83, 0.35), 0 0 6px rgba(0, 200, 83, 0.2);
            --shadow-glow-yellow: 0 0 22px rgba(255, 225, 0, 0.5), 0 0 8px rgba(255, 225, 0, 0.3);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition-jelly: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }
        .topnav-glass {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            z-index: 100;
            position: relative;
        }
        .staff-wall {
            background: var(--card);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            z-index: 50;
        }
        .staff-card {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all var(--transition-smooth);
            cursor: default;
            position: relative;
        }
        .staff-card.idle-highlight {
            border-color: var(--green) !important;
            box-shadow: var(--shadow-glow-green) !important;
            background: #f0fdf6 !important;
            animation: pulseGreen 1.2s ease-in-out infinite;
        }
        .staff-card.overload-warn {
            border-color: var(--yellow) !important;
            box-shadow: var(--shadow-glow-yellow) !important;
            animation: breatheYellow 0.7s ease-in-out infinite;
        }
        @keyframes pulseGreen {
            0%,
            100% {
                box-shadow: 0 0 12px rgba(0, 200, 83, 0.25), 0 0 3px rgba(0, 200, 83, 0.15);
            }
            50% {
                box-shadow: 0 0 28px rgba(0, 200, 83, 0.5), 0 0 10px rgba(0, 200, 83, 0.3);
            }
        }
        @keyframes breatheYellow {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 225, 0, 0.3), 0 0 4px rgba(255, 225, 0, 0.2);
                border-color: #ffe100;
            }
            50% {
                box-shadow: 0 0 28px rgba(255, 225, 0, 0.7), 0 0 14px rgba(255, 200, 0, 0.5);
                border-color: #ffc107;
            }
        }
        .track-column {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            min-height: 0;
            transition: all var(--transition-smooth);
            position: relative;
        }
        .track-column.drag-over {
            border-color: var(--green) !important;
            box-shadow: var(--shadow-glow-green) !important;
            background: #fafffb !important;
        }
        .track-column.track-disabled {
            opacity: 0.45;
            pointer-events: none;
            background: #f0f0f0 !important;
            border-style: dashed !important;
        }
        .track-header {
            flex-shrink: 0;
            padding: 12px 10px 8px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--card);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            z-index: 2;
        }
        .track-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
            border-radius: 999px;
            background: #1a1a2e;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
            padding: 0 8px;
            margin-left: 4px;
        }
        .track-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 6px;
            box-shadow: 0 0 8px rgba(0, 200, 83, 0.5);
        }
        .track-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            min-height: 0;
            scroll-behavior: smooth;
        }
        .track-body::-webkit-scrollbar {
            width: 3px;
        }
        .track-body::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        .track-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .order-card {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            cursor: grab;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-jelly);
            position: relative;
            flex-shrink: 0;
            font-size: 13px;
            line-height: 1.5;
        }
        .order-card:active {
            cursor: grabbing;
        }
        .order-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .order-card.dragging {
            opacity: 0.55;
            transform: scale(0.94);
            box-shadow: var(--shadow-lg);
            border-style: dashed;
            cursor: grabbing;
        }
        .order-card.drop-bounce {
            animation: jellyPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .order-card.overload-card {
            border-color: var(--yellow) !important;
            animation: breatheYellowCard 0.7s ease-in-out infinite;
        }
        @keyframes jellyPop {
            0% {
                transform: scale(0.88);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.05);
                opacity: 1;
            }
            70% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes breatheYellowCard {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(255, 225, 0, 0.25);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 225, 0, 0.6), 0 0 8px rgba(255, 180, 0, 0.4);
            }
        }
        .channel-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ede9fe, #f3e8ff);
            color: #7c3aed;
            margin-bottom: 4px;
        }
        .type-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            letter-spacing: 0.4px;
        }
        .type-tag.makeup {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
        }
        .type-tag.rental {
            background: #e3f2fd;
            color: #0d47a1;
            border: 1px solid #90caf9;
        }
        .type-tag.photo {
            background: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #a5d6a7;
        }
        .btn-action {
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            transition: all var(--transition-smooth);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .btn-action:hover {
            background: #f9fafb;
            border-color: #cbd5e1;
        }
        .btn-action.btn-green {
            background: #e8f5e9;
            border-color: #a5d6a7;
            color: #1b5e20;
        }
        .btn-action.btn-green:hover {
            background: #c8e6c9;
            border-color: #66bb6a;
        }
        .btn-action.btn-copper {
            background: #fbe9e7;
            border-color: #ffab91;
            color: #bf360c;
        }
        .btn-action.btn-copper:hover {
            background: #ffccbc;
            border-color: #ff8a65;
        }
        .btn-action.btn-print {
            background: #f5f5f5;
            border-color: #bdbdbd;
            color: #424242;
        }
        .btn-action.btn-print:hover {
            background: #eeeeee;
            border-color: #9e9e9e;
        }
        .btn-action.btn-disabled {
            opacity: 0.4;
            pointer-events: none;
            background: #eee;
        }
        .price-calc {
            background: #fafafa;
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
            border: 1px dashed #e0e0e0;
            font-size: 11px;
        }
        .price-calc select {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
        }
        .price-calc .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1.5px solid #ccc;
            background: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-smooth);
        }
        .price-calc .qty-btn:hover {
            background: #f0f0f0;
            border-color: #999;
        }
        .price-calc .qty-num {
            font-weight: 700;
            font-size: 15px;
            min-width: 28px;
            text-align: center;
            display: inline-block;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-box {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            max-width: 640px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @media print {
            body * {
                visibility: hidden !important;
            }
            #printArea,
            #printArea * {
                visibility: visible !important;
            }
            #printArea {
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                max-width: 297mm !important;
                min-height: 190mm !important;
                max-height: 210mm !important;
                padding: 8mm 10mm !important;
                background: #fff !important;
                z-index: 99999 !important;
                font-size: 10px !important;
                color: #000 !important;
                overflow: hidden !important;
                page-break-after: avoid !important;
            }
            #printArea .print-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 10px;
            }
            #printArea .print-table td,
            #printArea .print-table th {
                border: 0.5px solid #999;
                padding: 4px 6px;
                text-align: left;
            }
            #printArea .print-signature {
                display: inline-block;
                width: 100px;
                border-bottom: 1px solid #000;
                margin: 0 12px;
            }
            @page {
                size: A4 landscape;
                margin: 2mm;
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- ==================== 登录拦截遮罩 ==================== -->
    <div id="authOverlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-white/80 backdrop-blur-xl">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-80 text-center">
            <div class="text-3xl font-bold mb-2" style="color:var(--green);">旅拍档期派</div>
            <div class="text-xs text-gray-400 mb-6">商家控制台</div>
            <input type="password" id="passwordInput" placeholder="请输入密码" class="w-full px-4 py-3 border rounded-xl mb-4 text-sm outline-none focus:border-green-400">
            <button id="loginBtn" class="w-full py-3 rounded-xl text-white font-bold text-sm transition hover:shadow-lg" style="background:var(--green);">进入控制台</button>
            <p class="text-xs text-gray-400 mt-4">员工密码: staff888 ｜ 老板密码: boss999</p>
        </div>
    </div>

    <!-- ==================== 顶部导航 ==================== -->
    <header class="topnav-glass flex items-center justify-between px-5 py-3 flex-shrink-0 gap-4 flex-wrap">
        <div class="flex items-center gap-3 flex-shrink-0">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-extrabold text-sm"
            style="background:linear-gradient(135deg,#00C853,#00a844); box-shadow:0 4px 14px rgba(0,200,83,0.35);">
            派
        </div>
        <div>
            <h1 class="text-base font-bold tracking-tight text-gray-900 leading-tight">旅拍档期派 · 商家控制台</h1>
            <p class="text-xs text-gray-500 tracking-wide">LIVE SCHEDULING DASHBOARD</p>
        </div>
    </div>

    <!-- 呼叫兼职按钮（样式修改：流光白背景、极光黄边框） -->
    <div class="flex items-center gap-4 flex-shrink-0">
        <button onclick="openCallPartTimer()" class="px-4 py-2 rounded-xl font-bold shadow-md hover:shadow-lg transition text-sm flex items-center justify-center" style="background:#fff; border:2px solid var(--yellow); color:#1a1a2e;">一键呼叫外部兼职</button>
    </div>

    <div class="flex items-center gap-4 flex-shrink-0">
        <div class="text-right" id="revenueDisplay">
            <span class="text-xs text-gray-500 block">今日实时营业额</span>
            <span class="text-2xl font-extrabold tracking-tight" style="color:var(--green);" id="todayRevenue">¥0</span>
        </div>
        <!-- 设置按钮已移除 -->
        <button onclick="openChannelManager()" id="channelBtn" class="btn-action text-xs px-3 py-2 rounded-lg" title="客源渠道">📋 渠道</button>
        <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500 underline">退出</button>
    </div>

    <!-- 盲打录入框 -->
    <div class="flex items-center gap-2 flex-shrink-0 min-w-[280px]">
        <input type="text" id="quickInput" placeholder="盲打录入：姓名 电话 定金 渠道 → 回车"
        class="flex-1 px-4 py-2.5 rounded-xl border text-sm font-medium outline-none transition-all duration-200
        bg-white/80 backdrop-blur-sm focus:bg-white focus:border-green-400 focus:shadow-md focus:shadow-green-100"
        style="border-color:var(--border); min-width:220px;"
        autocomplete="off">
        <button onclick="handleQuickInput()" class="px-4 py-2.5 rounded-xl text-white font-bold text-sm transition-all duration-200 hover:shadow-lg"
        style="background:var(--green);">↵</button>
    </div>
</header>

<!-- ==================== 主体三栏布局 ==================== -->
<div class="flex flex-1 overflow-hidden" style="min-height:0;">

    <!-- 左侧运力墙 15% -->
    <aside class="staff-wall w-[15%] min-w-[160px] flex flex-col overflow-y-auto flex-shrink-0 p-3 gap-3" id="staffWall">
        <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1 text-center">💄 化妆师运力</div>
        <div id="makeupStaffList" class="flex flex-col gap-2"></div>
        <hr class="my-2 border-gray-200">
        <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1 text-center">📷 摄影师运力</div>
        <div id="photoStaffList" class="flex flex-col gap-2"></div>
        <div class="mt-auto pt-4 text-center">
            <button onclick="addStaffPrompt('makeup')" class="text-xs text-gray-400 hover:text-gray-600 underline cursor-pointer">+ 添化妆师</button>
            <button onclick="addStaffPrompt('photo')" class="text-xs text-gray-400 hover:text-gray-600 underline cursor-pointer ml-3">+ 添摄影师</button>
        </div>
    </aside>

    <!-- 中部六轨矩阵 85% -->
    <main class="flex-1 flex gap-3 p-3 overflow-hidden" style="min-width:0;" id="trackContainer">
        <!-- 轨道由JS动态渲染 -->
    </main>
</div>

<!-- ==================== 渠道管理弹窗 ==================== -->
<div id="channelModal" class="modal-overlay hidden" onclick="if(event.target===this)closeChannelManager()">
    <div class="modal-box" style="max-width:750px;">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">📋 渠道管理</h2>
            <button onclick="closeChannelManager()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div class="flex flex-col md:flex-row gap-4">
            <!-- 左栏：新增渠道 -->
            <div class="w-full md:w-1/3 bg-gray-50 rounded-xl p-4">
                <h3 class="font-semibold text-sm mb-3">➕ 新增渠道标签</h3>
                <div class="flex gap-2">
                    <input type="text" id="newChannelInput" placeholder="如：小红书、抖音…" class="flex-1 px-3 py-2 rounded-lg border text-sm">
                    <button onclick="addNewChannel()" class="px-4 py-2 rounded-lg text-white font-bold text-sm" style="background:var(--green);">添加</button>
                </div>
                <p class="text-xs text-gray-400 mt-2">* 新渠道将在下次统计中生效</p>
            </div>
            <!-- 右栏：今日统计表格 -->
            <div class="w-full md:w-2/3">
                <h3 class="font-semibold text-sm mb-2">📊 今日渠道对账表</h3>
                <div class="overflow-x-auto max-h-64 overflow-y-auto">
                    <table class="w-full text-xs border-collapse">
                        <thead class="bg-gray-100 sticky top-0">
                            <tr>
                                <th class="p-2 text-left">渠道</th>
                                <th class="p-2 text-right">订单数</th>
                                <th class="p-2 text-right">总金额</th>
                            </tr>
                        </thead>
                        <tbody id="channelTableBody"></tbody>
                        <tfoot id="channelTableFoot" class="font-bold border-t-2 border-gray-300"></tfoot>
                    </table>
                </div>
            </div>
        </div>
        <div class="flex justify-end mt-4">
            <button onclick="closeChannelManager()" class="px-4 py-2 rounded-lg text-white font-bold text-sm" style="background:var(--green);">关闭</button>
        </div>
    </div>
</div>

<!-- ==================== 呼叫兼职弹窗 ==================== -->
<div id="callPartTimerModal" class="modal-overlay hidden">
    <div class="modal-box">
        <h2 class="text-lg font-bold mb-4">📣 一键呼叫外部兼职</h2>
        <div class="space-y-3 text-sm">
            <div>
                <label class="font-semibold block mb-1">基础工费 (¥)</label>
                <input type="number" id="basePay" value="200" class="w-full px-3 py-2 rounded-lg border">
            </div>
            <div>
                <label class="font-semibold block mb-1">工种风格</label>
                <select id="styleSelect" class="w-full px-3 py-2 rounded-lg border">
                    <optgroup label="化妆造型">
                        <option>傣族重工</option>
                        <option>敦煌飞天</option>
                        <option>苗族银饰</option>
                        <option>大唐古风</option>
                        <option>清宫旗头</option>
                        <option>西域公主</option>
                        <option>战国袍</option>
                        <option>现代高奢</option>
                    </optgroup>
                    <optgroup label="摄影风格">
                        <option>暮光夜景</option>
                        <option>日系复古</option>
                        <option>新中式国潮</option>
                        <option>纪实情绪</option>
                        <option>法式浪漫</option>
                        <option>纪实旅拍</option>
                        <option>高级大片</option>
                    </optgroup>
                </select>
            </div>
            <div class="flex items-center gap-3">
                <label class="font-semibold">二消提成</label>
                <input type="checkbox" id="commissionToggle" checked>
                <span class="text-xs text-gray-500">启用</span>
            </div>
            <div>
                <label class="font-semibold block mb-1">店员提成比例 (%)</label>
                <input type="number" id="commissionPercent" value="20" class="w-full px-3 py-2 rounded-lg border">
            </div>
        </div>
        <button onclick="confirmCall()" class="mt-4 w-full py-2 rounded-lg text-white font-bold text-sm" style="background:var(--copper);">确认发布</button>
        <button onclick="document.getElementById('callPartTimerModal').classList.add('hidden')" class="mt-2 w-full py-2 rounded-lg border text-sm">取消</button>
    </div>
</div>

<!-- ==================== 押金弹窗 ==================== -->
<div id="depositModal" class="modal-overlay hidden" onclick="if(event.target===this)closeDepositModal()">
    <div class="modal-box text-sm">
        <h3 class="font-bold text-lg mb-3">⚠️ 服装外借 - 押金登记</h3>
        <p class="mb-2 text-gray-600">客户离店需确认押金已收</p>

    (function() {
        // ==================== IndexedDB 封装 ====================
        const DB_NAME = 'TravelPhotoScheduler';
        const DB_VERSION = 1;
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('orders')) {
                        database.createObjectStore('orders', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('staff')) {
                        database.createObjectStore('staff', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('settings')) {
                        database.createObjectStore('settings', { keyPath: 'key' });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function dbPut(storeName, data) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not ready'); return; }
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.put(data);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        function dbGetAll(storeName) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not ready'); return; }
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function dbDelete(storeName, id) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not ready'); return; }
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        // ==================== 数据加载与同步 ====================
        async function loadAllData() {
            try {
                const orders = await dbGetAll('orders');
                const staff = await dbGetAll('staff');
                const settingsArr = await dbGetAll('settings');
                if (orders.length === 0 && staff.length === 0) {
                    const defStaff = getDefaultStaff();
                    const defOrders = getDefaultOrders();
                    for (const s of defStaff) await dbPut('staff', s);
                    for (const o of defOrders) await dbPut('orders', o);
                    allStaff = defStaff;
                    allOrders = defOrders;
                    todayFlowCounter = defOrders.length;
                } else {
                    allStaff = staff.length > 0 ? staff : getDefaultStaff();
                    allOrders = orders;
                    todayFlowCounter = orders.length;
                }
                if (settingsArr.length > 0) {
                    const settingsMap = {};
                    settingsArr.forEach(s => settingsMap[s.key] = s.value);
                    appSettings.selectionMode = settingsMap['selectionMode'] || 'inStore';
                    appSettings.priceStandard = parseFloat(settingsMap['priceStandard']) || 40;
                    appSettings.pricePremium = parseFloat(settingsMap['pricePremium']) || 60;
                    appSettings.priceCommercial = parseFloat(settingsMap['priceCommercial']) || 100;
                }
                if (allStaff.length === 0) allStaff = getDefaultStaff();
                recalcStaffLoads();
                renderAll();
            } catch (err) {
                console.error('数据加载失败，使用内存默认数据:', err);
                allStaff = getDefaultStaff();
                allOrders = getDefaultOrders();
                todayFlowCounter = allOrders.length;
                recalcStaffLoads();
                renderAll();
            }

            await dbPut('orders', order);

            await dbPut('staff', s);

        async function saveSettings() {
            const settingsData = [
                { key: 'selectionMode', value: appSettings.selectionMode },
                { key: 'priceStandard', value: appSettings.priceStandard },
                { key: 'pricePremium', value: appSettings.pricePremium },
                { key: 'priceCommercial', value: appSettings.priceCommercial },
            ];
            for (const s of settingsData) await dbPut('settings', s);
            // 重新计算所有订单的加选费用
            allOrders.forEach(o => recalcExtraCost(o));
            renderAll();
        }

        // ==================== 运力计算 ====================
        function recalcStaffLoads() {
            allStaff.forEach(s => { s.currentLoad = 0;
                s.status = 'idle'; });
            allOrders.forEach(order => {
                if (order.currentTrack === 'track3' && order.makeupArtistId) {
                    const staff = allStaff.find(s => s.id === order.makeupArtistId);
                    if (staff) staff.currentLoad++;
                }
                if (order.currentTrack === 'track4' && order.photographerId) {
                    const staff = allStaff.find(s => s.id === order.photographerId);
                    if (staff) staff.currentLoad++;
                }
            });
            allStaff.forEach(s => {
                if (s.currentLoad === 0) s.status = 'idle';
                else if (s.currentLoad === 1) s.status = 'busy';
                else s.status = 'overload';
            });
        }

        function getStaffStatusText(s) {
            if (s.status === 'idle') return '🟢 空闲';
            if (s.status === 'busy') return '🟡 忙碌';
            return '🔴 超载';
        }

            <div class="order-card ${overloadClass}"

            <span class="channel-tag">${order.channel || '散客'}</span>

        </div>`;
    }

    function updateRevenue() {
        if (currentRole !== 'boss') return;
        const today = new Date().toISOString().split('T')[0];
        const todayOrders = allOrders.filter(o => o.date === today);
        let total = 0;
        todayOrders.forEach(o => {
            total += (o.deposit || 0) + (o.extraCost || 0) + (o.depositAmount || 0);
        });
        document.getElementById('todayRevenue').textContent = '¥' + total.toLocaleString();
    }

    // ==================== 拖拽处理 ====================
    function handleDragStart(e) {
        const card = e.target.closest('.order-card');
        if (!card) return;
        draggingOrderId = card.dataset.orderId;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggingOrderId);
    }

    function handleDragEnd(e) {
        const card = e.target.closest('.order-card');
        if (card) card.classList.remove('dragging');
        draggingOrderId = null;
        globalHighlightRole = null;
        hoveredTrackKey = null;
        document.querySelectorAll('.track-column').forEach(col => col.classList.remove('drag-over'));
        renderStaffWall();
    }

    window.handleDragOver = function(e, trackId, trackKey) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        hoveredTrackKey = trackKey;
        const col = document.getElementById('track-col-' + trackId);
        if (col) col.classList.add('drag-over');

        if (trackKey === 'styling') {
            globalHighlightRole = 'makeup';
        } else if (trackKey === 'shooting') {
            globalHighlightRole = 'photo';
        } else {
            globalHighlightRole = null;
        }
        renderStaffWall();

        if (draggingOrderId) {
            const order = allOrders.find(o => o.id === draggingOrderId);
            if (order) {
                if (trackKey === 'styling' && order.type === 'photo_only') {
                    e.dataTransfer.dropEffect = 'none';
                    if (col) col.classList.add('track-disabled');
                }
                if (trackKey === 'shooting' && order.type === 'makeup_only') {
                    e.dataTransfer.dropEffect = 'none';
                    if (col) col.classList.add('track-disabled');
                }
            }
        }
    };

    window.handleDragLeave = function(e, trackId) {
        const col = document.getElementById('track-col-' + trackId);
        if (col) col.classList.remove('drag-over');
        if (hoveredTrackKey === col?.dataset?.trackKey) {
            hoveredTrackKey = null;
            globalHighlightRole = null;
            renderStaffWall();
        }
    };

    window.handleDrop = async function(e, trackId, trackKey) {
        e.preventDefault();
        const col = document.getElementById('track-col-' + trackId);
        if (col) col.classList.remove('drag-over');
        globalHighlightRole = null;
        hoveredTrackKey = null;

        const orderId = e.dataTransfer.getData('text/plain') || draggingOrderId;
        if (!orderId) { renderStaffWall(); return; }

        const order = allOrders.find(o => o.id === orderId);
        if (!order) { renderStaffWall(); return; }

        if (trackKey === 'styling' && order.type === 'photo_only') {
            alert('⚠️ 纯摄影模式订单无需妆造，请直接拖入「指派摄影」轨道');
            renderStaffWall();
            return;
        }
        if (trackKey === 'shooting' && order.type === 'makeup_only') {
            alert('⚠️ 纯妆造模式订单无需拍摄，请使用「跳过拍摄」按钮直飞结算');
            renderStaffWall();
            return;
        }
        if (trackKey === 'selection' && order.type === 'rental' && !order.rentalDepositPaid) {
            alert('⚠️ 服装外借订单在进入选片轨道前，必须登记押金！');
            openDepositModal(order.id);
        }

        const oldTrack = order.currentTrack;
        order.currentTrack = trackId;
        order.timestamp = Date.now();

        if (trackKey === 'styling' && !order.makeupArtistId && order.type !== 'photo_only') {
            const idleStaff = allStaff.find(s => s.role === 'makeup' && s.status === 'idle');
            if (idleStaff) {
                order.makeupArtistId = idleStaff.id;
            } else {
                const makeupStaff = allStaff.filter(s => s.role === 'makeup');
                if (makeupStaff.length > 0) {
                    const leastLoaded = makeupStaff.reduce((a, b) => a.currentLoad <= b.currentLoad ? a : b);
                    order.makeupArtistId = leastLoaded.id;
                }
            }
        }
        if (trackKey === 'shooting' && !order.photographerId && order.type !== 'makeup_only') {
            const idleStaff = allStaff.find(s => s.role === 'photo' && s.status === 'idle');
            if (idleStaff) {
                order.photographerId = idleStaff.id;
            } else {
                const photoStaff = allStaff.filter(s => s.role === 'photo');
                if (photoStaff.length > 0) {
                    const leastLoaded = photoStaff.reduce((a, b) => a.currentLoad <= b.currentLoad ? a : b);
                    order.photographerId = leastLoaded.id;
                }
            }
        }
        if (oldTrack === 'track3' && trackId !== 'track3') {
            order.makeupArtistId = null;
        }
        if (oldTrack === 'track4' && trackId !== 'track4') {
            order.photographerId = null;
        }

        await saveOrder(order);
        recalcStaffLoads();
        renderAll();

        setTimeout(() => {
            const cardEl = document.getElementById('card-' + order.id);
            if (cardEl) {
                cardEl.classList.add('drop-bounce');
                setTimeout(() => cardEl.classList.remove('drop-bounce'), 500);
            }
            const trackBody = document.getElementById('track-body-' + trackId);
            if (trackBody && cardEl) {
                cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 80);

        if (trackKey === 'styling' && order.makeupArtistId) {
            const s = allStaff.find(st => st.id === order.makeupArtistId);
            if (s && s.currentLoad >= 2) {
                setTimeout(() => alert(`⚠️ 运力超载预警！\n${s.name} 当前背负 ${s.currentLoad} 单，请关注！`), 300);
            }
        }
        if (trackKey === 'shooting' && order.photographerId) {
            const s = allStaff.find(st => st.id === order.photographerId);
            if (s && s.currentLoad >= 2) {
                setTimeout(() => alert(`⚠️ 运力超载预警！\n${s.name} 当前背负 ${s.currentLoad} 单，请关注！`), 300);
            }
        }
    };

    // ==================== 智能输入解析（修复渠道识别） ====================
    window.handleQuickInput = function() {
        const input = document.getElementById('quickInput');
        const raw = input.value.trim();
        if (!raw) return;
        const result = parseInput(raw);
        createNewOrder(result);
        input.value = '';
        input.focus();
    };

    function parseInput(raw) {
        // 按空格分割为词元
        const tokens = raw.split(/\s+/).filter(Boolean);
        if (tokens.length === 0) {
            return { name: '匿名散客', phone: '', deposit: 0, channel: '散客' };
        }

        // 最后一个词作为渠道
        const channel = tokens.pop();

        // 剩余部分中提取电话和定金
        let phone = '';
        let deposit = 0;
        const remainingTokens = [];

        for (const token of tokens) {
            if (!phone && /^1[3-9]\d{9}$/.test(token)) {
                phone = token;
            } else if (deposit === 0 && /^\d{1,6}$/.test(token) && parseInt(token) > 0) {
                deposit = parseInt(token);
            } else {
                remainingTokens.push(token);
            }
        }

        // 剩余部分拼接为姓名
        let name = remainingTokens.join('') || '匿名散客';
        if (name.length > 10) name = name.substring(0, 10); // 防止过长

        return { name, phone, deposit, channel };
    }

    async function createNewOrder(parsed) {
        todayFlowCounter++;
        const today = new Date().toISOString().split('T')[0];
        const flowNum = '#' + String(todayFlowCounter).padStart(3, '0');
        const newOrder = {
            id: 'order_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
            flowNumber: flowNum,
            name: parsed.name,
            phone: parsed.phone,
            deposit: parsed.deposit,
            channel: parsed.channel,
            type: 'comprehensive',
            currentTrack: 'track1',
            timestamp: Date.now(),
            wechatAdded: false,
            makeupArtistId: null,
            photographerId: null,
            depositAmount: 0,
            rentalReturned: false,
            extraPhotos: 0,
            retouchLevel: 'standard',
            extraCost: 0,
            totalAmount: parsed.deposit,
            date: today,
            rentalDepositPaid: false,
        };
        allOrders.push(newOrder);
        await saveOrder(newOrder);
        recalcStaffLoads();
        renderAll();
        setTimeout(() => {
            const cardEl = document.getElementById('card-' + newOrder.id);
            if (cardEl) {
                cardEl.classList.add('drop-bounce');
                setTimeout(() => cardEl.classList.remove('drop-bounce'), 500);
                const trackBody = document.getElementById('track-body-track1');
                if (trackBody) cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 100);
    }

    // ==================== 业务操作 ====================
    window.skipToDelivery = async function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        if (order.type !== 'makeup_only') {
            alert('仅纯妆造模式可跳过拍摄');
            return;
        }
        order.currentTrack = 'track6';
        order.timestamp = Date.now();
        order.makeupArtistId = null;
        await saveOrder(order);
        recalcStaffLoads();
        renderAll();
    };

    window.markWechatAdded = async function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        order.wechatAdded = true;
        await saveOrder(order);
        renderAll();
    };

    window.openDepositModal = function(orderId) {
        pendingDepositOrderId = orderId;
        document.getElementById('depositAmountInput').value = '';
        document.getElementById('depositModal').classList.remove('hidden');
    };

    window.closeDepositModal = function() {
        pendingDepositOrderId = null;
        document.getElementById('depositModal').classList.add('hidden');
    };

    window.confirmDeposit = async function() {
        if (!pendingDepositOrderId) return;
        const amount = parseInt(document.getElementById('depositAmountInput').value) || 0;
        const order = allOrders.find(o => o.id === pendingDepositOrderId);
        if (order) {
            order.rentalDepositPaid = true;
            order.depositAmount = amount;
            order.totalAmount += amount;
            await saveOrder(order);
        }
        closeDepositModal();
        recalcStaffLoads();
        renderAll();
    };

    window.markRentalReturned = async function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        order.rentalReturned = true;
        await saveOrder(order);
        renderAll();
    };

    window.updateRetouchLevel = async function(orderId, level) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        order.retouchLevel = level;
        recalcExtraCost(order);
        await saveOrder(order);
        renderAll();
    };

    window.changeExtraPhotos = async function(orderId, delta) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        order.extraPhotos = Math.max(0, (order.extraPhotos || 0) + delta);
        recalcExtraCost(order);
        await saveOrder(order);
        renderAll();
    };

    function recalcExtraCost(order) {
        const priceMap = {
            standard: appSettings.priceStandard,
            premium: appSettings.pricePremium,
            commercial: appSettings.priceCommercial,
        };
        const unitPrice = priceMap[order.retouchLevel] || appSettings.priceStandard;
        order.extraCost = order.extraPhotos * unitPrice;
        order.totalAmount = (order.deposit || 0) + order.extraCost + (order.depositAmount || 0);
    }

    // ==================== 运力增删 ====================
    window.addStaffPrompt = async function(role) {
        const name = prompt(`请输入新${role === 'makeup' ? '化妆师' : '摄影师'}姓名：`);
        if (!name || !name.trim()) return;
        const newStaff = {
            id: 'staff_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
            name: name.trim(),
            role: role,
            status: 'idle',
            currentLoad: 0,
        };
        allStaff.push(newStaff);
        await saveStaff(newStaff);
        recalcStaffLoads();
        renderAll();
    };

    window.removeStaff = async function(id) {
        const staff = allStaff.find(s => s.id === id);
        if (!staff) return;
        if (staff.currentLoad > 0) {
            alert('该人员正在服务中，无法删除');
            return;
        }
        if (confirm(`确定让 ${staff.name} 下班并移除？`)) {
            allStaff = allStaff.filter(s => s.id !== id);
            await dbDelete('staff', id);
            recalcStaffLoads();
            renderAll();
        }
    };

    // ==================== 渠道弹窗 ====================
    window.openChannelManager = function() {
        const today = new Date().toISOString().split('T')[0];
        const orders = allOrders.filter(o => o.date === today);
        const stats = {};
        orders.forEach(o => {
            const ch = o.channel || '散客';
            if (!stats[ch]) stats[ch] = { count: 0, total: 0 };
            stats[ch].count++;
            stats[ch].total += (o.deposit || 0) + (o.extraCost || 0) + (o.depositAmount || 0);
        });
        const tbody = document.getElementById('channelTableBody');
        const tfoot = document.getElementById('channelTableFoot');
        let bodyHTML = '';
        let totalCount = 0;
        let totalAmount = 0;
        Object.entries(stats).forEach(([ch, data]) => {
            totalCount += data.count;
            totalAmount += data.total;
            bodyHTML += `
                <tr class="border-b border-gray-100">
                    <td class="p-2">${ch}</td>
                    <td class="p-2 text-right">${data.count} 单</td>
                    <td class="p-2 text-right">¥${data.total.toLocaleString()}</td>
                </tr>`;
        });
        if (!bodyHTML) {
            bodyHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-400">今日暂无订单</td></tr>';
        }
        tbody.innerHTML = bodyHTML;
        tfoot.innerHTML = `
            <tr>
                <td class="p-2">📌 渠道对账结算</td>
                <td class="p-2 text-right">合计 ${totalCount} 单</td>
                <td class="p-2 text-right">¥${totalAmount.toLocaleString()}</td>
            </tr>`;
        document.getElementById('newChannelInput').value = '';
        document.getElementById('channelModal').classList.remove('hidden');
    };

    window.closeChannelManager = function() {
        document.getElementById('channelModal').classList.add('hidden');
    };

    window.addNewChannel = function() {
        const input = document.getElementById('newChannelInput');
        const channelName = input.value.trim();
        if (!channelName) return;
        alert(`✅ 渠道“${channelName}”已记录，将在下次订单中使用`);
        input.value = '';
    };

    // ==================== 呼叫兼职弹窗 ====================
    window.openCallPartTimer = function() {
        document.getElementById('callPartTimerModal').classList.remove('hidden');
    };
    window.confirmCall = function() {
        alert('📢 兼职呼叫已发布！提成比例仅接单成功后定向显示');
        document.getElementById('callPartTimerModal').classList.add('hidden');
    };

    // ==================== 打印功能 ====================
    window.printOrder = function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        const levelLabels = { standard: '标准精修', premium: '超精修', commercial: '商业精修' };
        const printArea = document.getElementById('printArea');
        printArea.innerHTML = `
        <div style="font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#000;">
            <h3 style="text-align:center;margin:0 0 8px;font-size:14px;border-bottom:2px solid #000;padding-bottom:6px;">
            旅拍档期派 · 双联电子单据</h3>
            <table class="print-table">
                <tr><td width="22%"><b>流水号</b></td><td width="28%">${order.flowNumber}</td><td width="22%"><b>渠道</b></td><td width="28%">${order.channel||'散客'}</td></tr>
                <tr><td><b>客户姓名</b></td><td>${order.name}</td><td><b>电话</b></td><td>${order.phone||'—'}</td></tr>
                <tr><td><b>业务类型</b></td><td>${order.type==='makeup_only'?'纯妆造':order.type==='photo_only'?'纯摄影':order.type==='rental'?'服装外借':'综合'}</td><td><b>定金</b></td><td>¥${order.deposit||0}</td></tr>
                <tr><td><b>精修标准</b></td><td>${levelLabels[order.retouchLevel]||'标准精修'}</td><td><b>加选张数</b></td><td>${order.extraPhotos} 张</td></tr>
                <tr><td><b>加选费用</b></td><td>¥${order.extraCost||0}</td><td><b>押金</b></td><td>¥${order.depositAmount||0}</td></tr>
                <tr><td><b>总金额</b></td><td style="font-weight:bold;font-size:13px;">¥${order.totalAmount||0}</td><td><b>财务状态</b></td><td>${order.currentTrack==='track6'?'✅ 已结算':'🔄 进行中'}</td></tr>
                <tr><td><b>特殊备注</b></td><td colspan="3">${order.type==='rental'?(order.rentalReturned?'衣服已归还':'⚠️ 衣服未还'):'—'}</td></tr>
            </table>
            <div style="margin-top:12px;display:flex;justify-content:space-between;font-size:11px;">
                <span>选片师签名：<span class="print-signature"></span></span>
                <span>客户签名：<span class="print-signature"></span></span>
                <span>日期：____年____月____日</span>
            </div>
            <p style="text-align:center;font-size:9px;color:#999;margin-top:8px;">此单据为电子打印凭证 · 旅拍档期派商家控制台</p>
        </div>`;
        printArea.style.display = 'block';
        setTimeout(() => {
            window.print();
            setTimeout(() => {
                printArea.style.display = 'none';
            }, 500);
        }, 200);
    };

    // ==================== 键盘事件 ====================
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.activeElement === document.getElementById('quickInput')) {
            e.preventDefault();
            handleQuickInput();
        }
    });

    // ==================== 初始化 ====================
    async function init() {
        await openDB();
        await loadAllData();
        const today = new Date().toISOString().split('T')[0];
        let needsSave = false;
        allOrders.forEach(o => {
            if (!o.date) { o.date = today;
                needsSave = true; }
            if (o.rentalDepositPaid === undefined) { o.rentalDepositPaid = false;
                needsSave = true; }
            if (o.extraPhotos === undefined) { o.extraPhotos = 0;
                needsSave = true; }
            if (o.extraCost === undefined) { o.extraCost = 0;
                needsSave = true; }
            if (o.totalAmount === undefined) { o.totalAmount = (o.deposit || 0);
                needsSave = true; }
        });
        if (needsSave) {
            for (const o of allOrders) await saveOrder(o);
        }
        recalcStaffLoads();
        checkAuthOnLoad();
        if (currentRole) {
            applyRolePermissions();
            renderAll();
        }
        document.getElementById('quickInput').focus();
    }

    init().catch(err => {
        console.error('初始化失败:', err);
        allStaff = getDefaultStaff();
        allOrders = getDefaultOrders();
        todayFlowCounter = allOrders.length;
        recalcStaffLoads();
        checkAuthOnLoad();
        renderAll();
        document.getElementById('quickInput').focus();
    });
})();
</script>
